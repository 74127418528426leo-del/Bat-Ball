<!DOCTYPE html>
<html lang="en" class="classic-mode">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⚡ CYBER BREAKER 3D — ULTRA EPIC EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;overscroll-behavior:none;}

body{font-family:'Rajdhani',sans-serif;}
@keyframes spin{to{transform:rotate(360deg);}}
body::before{content:"";position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,247,255,.012) 0 1px,transparent 1px 44px),
             repeating-linear-gradient(90deg,rgba(0,247,255,.012) 0 1px,transparent 1px 50px);
  pointer-events:none;z-index:9999;}
#wrap{position:relative;width:100vw;height:100vh;}
#c3d{position:absolute;inset:0;display:block;width:100%!important;height:100%!important;cursor:crosshair;touch-action:none; -ms-touch-action:none;}

#hud{position:absolute;inset:0;pointer-events:none;display:block;}
#hint{position:fixed;bottom:14px;right:14px;z-index:9998;
  font-family:'Orbitron',sans-serif;font-size:9px;color:rgba(0,247,255,.5);
  background:rgba(0,0,0,.55);border:1px solid rgba(0,247,255,.2);
  padding:5px 10px;border-radius:5px;pointer-events:none;line-height:1.6;}

/* Cockpit dashboard glow overlay */
#cockpitOverlay{position:fixed;bottom:0;left:0;right:0;height:0;pointer-events:none;z-index:8888;transition:opacity .5s;}
#cockpitOverlay.active{height:auto;}
#cockpitDash{
  position:fixed;bottom:0;left:0;right:0;height:72px;pointer-events:none;z-index:8888;
  background:linear-gradient(to top,rgba(0,247,255,0.13) 0%,rgba(0,247,255,0.04) 60%,transparent 100%);
  border-top:2px solid rgba(0,247,255,0.35);
  box-shadow:0 0 40px rgba(0,247,255,0.22) inset,0 -4px 32px rgba(0,247,255,0.12);
  opacity:0;transition:opacity .5s;
}
#cockpitDash.active{opacity:1;}
#cockpitDash::before{
  content:'';position:absolute;top:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,247,255,0.8) 20%,rgba(0,247,255,1) 50%,rgba(0,247,255,0.8) 80%,transparent);
}
#cockpitDash::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:180px;height:3px;border-radius:2px;
  background:rgba(0,247,255,0.6);box-shadow:0 0 18px 4px rgba(0,247,255,0.4);
}

/* View toggle button */
#viewToggleBtn{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:9998;font-family:'Orbitron',sans-serif;font-size:9px;
  color:rgba(0,247,255,.75);background:rgba(0,15,30,.7);
  border:1px solid rgba(0,247,255,.4);padding:7px 18px;border-radius:20px;
  cursor:pointer;letter-spacing:1px;user-select:none;
  box-shadow:0 0 14px rgba(0,247,255,.18);transition:all .2s;
}
#viewToggleBtn:hover{background:rgba(0,40,60,.9);box-shadow:0 0 22px rgba(0,247,255,.35);}
#viewToggleBtn:active{transform:translateX(-50%) scale(.95);}

/* Cockpit vignette */
#vignette{
  position:fixed;inset:0;pointer-events:none;z-index:8880;opacity:0;
  transition:opacity .4s;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.65) 100%);
}
#vignette.active{opacity:1;}

/* Speed lines for FAST powerup */
#speedLines{
  position:fixed;inset:0;pointer-events:none;z-index:8881;opacity:0;
  transition:opacity .3s;overflow:hidden;
}
#speedLines.active{opacity:1;}

/* Cockpit warning flash for danger */
#dangerFlash{
  position:fixed;inset:0;pointer-events:none;z-index:8882;opacity:0;
  background:rgba(255,30,60,0.0);transition:background .1s;
}
#dangerFlash.pulse{
  animation:dangerPulseAnim 0.5s ease-out;
}
@keyframes dangerPulseAnim{
  0%{background:rgba(255,30,60,0.18);}
  100%{background:rgba(255,30,60,0.0);}
}

/* Cockpit edge chrome streaks */
#chromeEdge{
  position:fixed;inset:0;pointer-events:none;z-index:8879;opacity:0;transition:opacity .5s;
}
#chromeEdge.active{opacity:1;}
#chromeEdge::before{content:'';position:absolute;bottom:0;left:0;right:0;height:160px;
  background:linear-gradient(to top,rgba(0,247,255,0.07),transparent);
  border-top:1px solid rgba(0,247,255,0.15);}
#chromeEdge::after{content:'';position:absolute;bottom:40px;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,247,255,0.5) 30%,rgba(0,247,255,0.5) 70%,transparent);
  box-shadow:0 0 10px rgba(0,247,255,0.3);}

/* Cockpit crosshair */
#crosshair{
  position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:8887;opacity:0;transition:opacity .4s;
}
#crosshair.active{opacity:1;}
#crosshair svg{width:40px;height:40px;}

/* ══════════════════════════════════════════
   ⚡ ULTRA EPIC ENHANCEMENTS ⚡
══════════════════════════════════════════ */

/* RGB Split Chromatic Aberration Overlay */
#rgbSplitOverlay{
  position:fixed;inset:0;pointer-events:none;z-index:9990;opacity:0;
  mix-blend-mode:screen;
}
#rgbSplitOverlay.active{
  animation:rgbSplitAnim 0.45s ease-out forwards;
}
@keyframes rgbSplitAnim{
  0%  {opacity:0;filter:none;transform:none;}
  8%  {opacity:1;filter:hue-rotate(180deg) saturate(3) brightness(1.5);transform:translate(4px,0);}
  18% {opacity:0.8;filter:hue-rotate(270deg) saturate(2);transform:translate(-4px,1px);}
  35% {opacity:0.5;filter:hue-rotate(90deg) saturate(1.5);transform:translate(2px,-1px);}
  55% {opacity:0.2;filter:saturate(1.2);transform:translate(-1px,0);}
  100%{opacity:0;filter:none;transform:none;}
}

/* Epic screen flash */
#epicFlash{
  position:fixed;inset:0;pointer-events:none;z-index:9989;opacity:0;
  background:#fff;
}
#epicFlash.flash-white{animation:flashWhite 0.3s ease-out forwards;}
#epicFlash.flash-cyan{animation:flashCyan 0.35s ease-out forwards;}
#epicFlash.flash-red{animation:flashRed 0.4s ease-out forwards;}
#epicFlash.flash-gold{animation:flashGold 0.35s ease-out forwards;}
@keyframes flashWhite{0%{opacity:0}5%{opacity:0.85}100%{opacity:0}}
@keyframes flashCyan{0%{opacity:0;background:rgba(0,247,255,1)}5%{opacity:0.7}100%{opacity:0}}
@keyframes flashRed{0%{opacity:0;background:rgba(255,30,60,1)}5%{opacity:0.6}100%{opacity:0}}
@keyframes flashGold{0%{opacity:0;background:rgba(255,176,32,1)}5%{opacity:0.7}100%{opacity:0}}

/* Boss Warning Pulse */
#bossWarning{
  position:fixed;inset:0;pointer-events:none;z-index:8878;opacity:0;
  border:3px solid rgba(255,30,60,0);transition:border-color 1s;
}
#bossWarning.active{
  opacity:1;
  border-color:rgba(255,30,60,0.7);
  animation:bossAlarm 1.4s ease-in-out infinite;
  box-shadow:inset 0 0 60px rgba(255,30,60,0.15),0 0 40px rgba(255,30,60,0.3);
}
@keyframes bossAlarm{
  0%,100%{box-shadow:inset 0 0 30px rgba(255,30,60,0.1),0 0 20px rgba(255,30,60,0.2);}
  50%    {box-shadow:inset 0 0 90px rgba(255,30,60,0.35),0 0 60px rgba(255,30,60,0.5);}
}

/* Warp Lines Effect */
#warpLines{
  position:fixed;inset:0;pointer-events:none;z-index:9100;opacity:0;overflow:hidden;
}
#warpLines.active{animation:warpIn 0.9s ease-out forwards;}
@keyframes warpIn{
  0%  {opacity:0;}
  10% {opacity:1;}
  60% {opacity:0.8;}
  100%{opacity:0;}
}

/* Enhanced scanlines with noise flicker */
body::before{content:"";position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,247,255,.014) 0 1px,transparent 1px 44px),
             repeating-linear-gradient(90deg,rgba(0,247,255,.014) 0 1px,transparent 1px 50px);
  pointer-events:none;z-index:9999;animation:scanFlicker 3.5s ease-in-out infinite;}
@keyframes scanFlicker{0%,100%{opacity:1;}45%{opacity:0.8;}47%{opacity:1;}
  49%{opacity:0.7;}51%{opacity:1;}73%{opacity:0.9;}75%{opacity:1.1;}77%{opacity:1;}}

/* CRT scanline overlay */
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9998;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0) 4px);
  animation:crtShift 0.1s steps(1) infinite;}
@keyframes crtShift{0%{background-position:0 0;}100%{background-position:0 4px;}}

/* Plasma corner accents */
#plasmaCorners{
  position:fixed;inset:0;pointer-events:none;z-index:8875;opacity:0;
  transition:opacity 0.5s;
}
#plasmaCorners.active{opacity:1;}
#plasmaCorners::before,#plasmaCorners::after{
  content:'';position:absolute;width:200px;height:200px;
  background:radial-gradient(ellipse at corner,rgba(0,247,255,0.08) 0%,transparent 70%);
}
#plasmaCorners::before{top:0;left:0;border-radius:0 0 100% 0;}
#plasmaCorners::after{bottom:0;right:0;border-radius:100% 0 0 0;}

/* Animated neon border glow */
#neonBorder{
  position:fixed;inset:0;pointer-events:none;z-index:8876;
  border:1px solid rgba(0,247,255,0.08);opacity:0;transition:opacity 0.5s;
}
#neonBorder.active{opacity:1;animation:neonPulse 2.5s ease-in-out infinite;}
@keyframes neonPulse{
  0%,100%{box-shadow:inset 0 0 20px rgba(0,247,255,0.05),0 0 8px rgba(0,247,255,0.06);}
  50%    {box-shadow:inset 0 0 50px rgba(0,247,255,0.12),0 0 20px rgba(0,247,255,0.1);}
}

/* Combo mega text burst */
#comboMega{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:9200;opacity:0;
  font-family:'Orbitron',sans-serif;font-size:80px;font-weight:900;
  color:#ffb020;text-shadow:0 0 60px #ffb020,0 0 120px rgba(255,176,32,0.5);
  letter-spacing:4px;white-space:nowrap;
}
#comboMega.burst{animation:comboBurst 0.7s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
@keyframes comboBurst{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(0.3);}
  15% {opacity:1;transform:translate(-50%,-50%) scale(1.2);}
  30% {transform:translate(-50%,-50%) scale(0.95);}
  50% {opacity:1;transform:translate(-50%,-50%) scale(1.05);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.0) translateY(-60px);}
}

/* Enhanced crosshair rings */
#crosshairRing1,#crosshairRing2{
  position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:8886;opacity:0;transition:opacity 0.4s;
  border-radius:50%;border:1px solid rgba(0,247,255,0.3);
}
#crosshairRing1.active,#crosshairRing2.active{opacity:1;}
#crosshairRing1{width:70px;height:70px;animation:spinRing 4s linear infinite;}
#crosshairRing2{width:100px;height:100px;animation:spinRing 8s linear infinite reverse;}
@keyframes spinRing{to{transform:translate(-50%,-50%) rotate(360deg);}}

/* Level complete epic flash */
#levelFlash{
  position:fixed;inset:0;pointer-events:none;z-index:9150;opacity:0;
}
#levelFlash.active{animation:levelBurst 1.2s ease-out forwards;}
@keyframes levelBurst{
  0%  {opacity:0;background:radial-gradient(circle,rgba(61,255,138,0.9) 0%,transparent 60%);}
  8%  {opacity:1;}
  35% {opacity:0.6;}
  100%{opacity:0;background:radial-gradient(circle,rgba(61,255,138,0) 0%,transparent 60%);}
}

/* Epic view toggle button */
#viewToggleBtn{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:9998;font-family:'Orbitron',sans-serif;font-size:9px;
  color:rgba(0,247,255,.9);background:rgba(0,5,18,.85);
  border:1px solid rgba(0,247,255,.55);padding:8px 22px;border-radius:20px;
  cursor:pointer;letter-spacing:2px;user-select:none;
  box-shadow:0 0 20px rgba(0,247,255,.25),inset 0 0 10px rgba(0,247,255,.05);
  transition:all .2s;text-transform:uppercase;
}
#viewToggleBtn:hover{
  background:rgba(0,30,55,.9);
  box-shadow:0 0 35px rgba(0,247,255,.5),inset 0 0 20px rgba(0,247,255,.1);
  border-color:rgba(0,247,255,.9);color:#fff;
  text-shadow:0 0 10px rgba(0,247,255,1);
}
#viewToggleBtn:active{transform:translateX(-50%) scale(.93);}

/* Power up flash ring */
@keyframes puRing{
  0%  {transform:translate(-50%,-50%) scale(0.5);opacity:0.9;}
  100%{transform:translate(-50%,-50%) scale(3.5);opacity:0;}
}

/* Ambient glow pulse on wrap */
@keyframes ambGlow{0%,100%{opacity:0.4;}50%{opacity:1;}}

/* ─────────────────────────────────────────────────────────────────────────────
   🎞️ MEDIA SKINS (FLOOR / WALLS / SPHERE)
   Load ANY Image / GIF / MP4 as textures (local files supported).
───────────────────────────────────────────────────────────────────────────── */
#mediaBtn{
  position:fixed;bottom:18px;left:14px;
  z-index:9998;font-family:'Orbitron',sans-serif;font-size:9px;
  color:rgba(255,176,32,.92);background:rgba(18,10,0,.72);
  border:1px solid rgba(255,176,32,.55);padding:8px 16px;border-radius:20px;
  cursor:pointer;letter-spacing:2px;user-select:none;text-transform:uppercase;
  box-shadow:0 0 18px rgba(255,176,32,.22),inset 0 0 10px rgba(255,176,32,.06);
  transition:all .18s;
}
#mediaBtn:hover{
  background:rgba(55,28,0,.85);
  box-shadow:0 0 30px rgba(255,176,32,.40),inset 0 0 18px rgba(255,176,32,.10);
  border-color:rgba(255,176,32,.92);color:#fff;
  text-shadow:0 0 10px rgba(255,176,32,1);
}
#mediaBtn:active{transform:scale(.95);}


/* ─────────────────────────────────────────────────────────────
   ⏸️ PAUSE (RIGHT SIDE) — pauses gameplay anytime
───────────────────────────────────────────────────────────── */
#pauseBtn{
  position:fixed;bottom:18px;right:14px;
  z-index:9998;font-family:'Orbitron',sans-serif;font-size:9px;
  color:rgba(255,77,109,.92);background:rgba(22,0,6,.72);
  border:1px solid rgba(255,77,109,.55);padding:8px 16px;border-radius:20px;
  cursor:pointer;letter-spacing:2px;user-select:none;text-transform:uppercase;
  box-shadow:0 0 18px rgba(255,77,109,.18),inset 0 0 10px rgba(255,77,109,.06);
  transition:all .18s;
}
#pauseBtn:hover{
  background:rgba(60,10,18,.85);
  box-shadow:0 0 30px rgba(255,77,109,.34),inset 0 0 18px rgba(255,77,109,.10);
  border-color:rgba(255,77,109,.92);color:#fff;
  text-shadow:0 0 10px rgba(255,77,109,1);
}
#pauseBtn:active{transform:scale(.95);}
#pauseBtn.on{
  color:rgba(61,255,138,.95);
  background:rgba(0,22,10,.72);
  border-color:rgba(61,255,138,.70);
  box-shadow:0 0 18px rgba(61,255,138,.18),inset 0 0 10px rgba(61,255,138,.06);
}
#pauseBtn.on:hover{
  background:rgba(0,44,18,.88);
  border-color:rgba(61,255,138,.92);
  box-shadow:0 0 34px rgba(61,255,138,.35),inset 0 0 18px rgba(61,255,138,.10);
  text-shadow:0 0 10px rgba(61,255,138,1);
}

/* Keep the hint readable and out of the way of the PAUSE button */
#hint{bottom:64px;}

#mediaPanel{
  position:fixed;left:14px;bottom:58px;z-index:9998;
  width:min(92vw, 320px);
  background:rgba(0,10,18,.84);
  border:1px solid rgba(0,247,255,.30);
  border-radius:14px;
  box-shadow:0 0 26px rgba(0,247,255,.18), inset 0 0 22px rgba(0,247,255,.06);
  backdrop-filter: blur(10px);
  padding:12px 12px 10px;
  display:none;
}
#mediaPanel.open{display:block;}
#mediaPanel .mpTitle{
  font-family:'Orbitron',sans-serif;
  font-weight:900;
  letter-spacing:3px;
  color:rgba(0,247,255,.92);
  text-shadow:0 0 18px rgba(0,247,255,.35);
  font-size:10px;
  margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
#mediaPanel .mpTitle .x{
  pointer-events:auto;cursor:pointer;
  color:rgba(255,77,109,.9);
  border:1px solid rgba(255,77,109,.35);
  background:rgba(40,0,10,.55);
  border-radius:10px;
  padding:5px 10px;
  font-size:9px;
  letter-spacing:2px;
}
#mediaPanel .mpRow{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;margin-bottom:8px;
}
#mediaPanel .mpRow .lbl{
  font-family:'Orbitron',sans-serif;
  font-size:9px;letter-spacing:2px;
  color:rgba(224,250,255,.86);
  min-width:70px;
}
#mediaPanel .mpRow .btns{display:flex;gap:8px;}
#mediaPanel button.mpBtn{
  pointer-events:auto;
  font-family:'Orbitron',sans-serif;
  font-size:9px;letter-spacing:2px;
  border-radius:999px;
  padding:7px 12px;
  cursor:pointer;
  text-transform:uppercase;
  user-select:none;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(0,247,255,.35);
  color:rgba(0,247,255,.9);
  transition:all .15s;
}
#mediaPanel button.mpBtn:hover{
  background:rgba(0,40,60,.8);
  border-color:rgba(0,247,255,.9);
  color:#fff;
  box-shadow:0 0 18px rgba(0,247,255,.25);
}
#mediaPanel button.mpBtn.warn{
  border-color:rgba(255,77,109,.45);
  color:rgba(255,77,109,.95);
}
#mediaPanel button.mpBtn.warn:hover{
  background:rgba(60,0,20,.75);
  border-color:rgba(255,77,109,.95);
  box-shadow:0 0 18px rgba(255,77,109,.25);
}
#mediaPanel .mpNote{
  margin-top:8px;
  font-size:9px;
  line-height:1.35;
  color:rgba(224,250,255,.62);
  letter-spacing:0.5px;
}



/* ─────────────────────────────────────────────────────────────
   CLASSIC MODE (NO CYBERPUNK SCREEN FX)
   Ensures media textures show true colors (no cyan scanlines/CRT).
───────────────────────────────────────────────────────────── */
html.classic-mode body::before,
html.classic-mode body::after{
  content:none !important;
  display:none !important;
  background:none !important;
  animation:none !important;
}
html.classic-mode #rgbSplitOverlay,
html.classic-mode #plasmaCorners,
html.classic-mode #warpLines,
html.classic-mode #epicFlash{
  display:none !important;
  opacity:0 !important;
  animation:none !important;
}

</style>

</head>
<body>
<div id="wrap">
  <canvas id="c3d"></canvas>
  <canvas id="hud"></canvas>
  <!-- Loading screen — hidden once init() succeeds -->
  <div id="loadingScreen" style="position:fixed;inset:0;background:radial-gradient(ellipse at center, #000b1a 0%, #000208 60%, #000 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99998;pointer-events:none;">
    <div style="position:relative;width:80px;height:80px;margin-bottom:28px;">
      <div style="position:absolute;inset:0;border:2px solid rgba(0,247,255,0.15);border-top:2px solid #00f7ff;border-radius:50%;animation:spin .7s linear infinite;"></div>
      <div style="position:absolute;inset:8px;border:2px solid rgba(177,76,255,0.1);border-right:2px solid #b14cff;border-radius:50%;animation:spin 1.1s linear infinite reverse;"></div>
      <div style="position:absolute;inset:18px;border:1px solid rgba(0,247,255,0.08);border-bottom:1px solid #00f7ff;border-radius:50%;animation:spin 0.9s linear infinite;"></div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;">⚡</div>
    </div>
    <div style="font-family:Orbitron,sans-serif;font-size:22px;font-weight:900;color:#00f7ff;letter-spacing:6px;text-shadow:0 0 30px #00f7ff,0 0 60px rgba(0,247,255,0.4);margin-bottom:8px;">CYBER BREAKER</div>
    <div style="font-family:Orbitron,sans-serif;font-size:9px;color:rgba(0,247,255,0.5);letter-spacing:3px;margin-bottom:4px;">ULTRA EPIC EDITION</div>
    <div style="width:200px;height:2px;background:rgba(0,247,255,0.1);border-radius:1px;margin-top:16px;overflow:hidden;">
      <div style="width:40%;height:100%;background:linear-gradient(90deg,transparent,#00f7ff,transparent);animation:loadSweep 1.2s ease-in-out infinite;"></div>
    </div>
    <style>@keyframes loadSweep{0%{transform:translateX(-100%) scaleX(0.5)}100%{transform:translateX(400%) scaleX(1.5)}}</style>
  </div>
  <div id="hint">⚡ COCKPIT — SLIDE/MOUSE · PADDLE &nbsp;|&nbsp; RIGHT-DRAG / 2-FINGER · LOOK<br>A/D OR ←/→ · MOVE &nbsp;|&nbsp; V · CHANGE VIEW</div>
  <div id="rgbSplitOverlay"></div>
  <div id="epicFlash"></div>
  <div id="bossWarning"></div>
  <div id="warpLines"></div>
  <div id="levelFlash"></div>
  <div id="neonBorder" class="active"></div>
  <div id="plasmaCorners" class="active"></div>
  <div id="comboMega"></div>
  <div id="crosshairRing1" class="active"></div>
  <div id="crosshairRing2" class="active"></div>

  <div id="vignette" class="active"></div>
  <div id="chromeEdge" class="active"></div>
  <div id="speedLines"></div>

<script>
/* ─────────────────────────────────────────────────────────────────────────────
   ASYNC THREE.js LOADER (NO PARSER BLOCKING)
   Prevents "stuck on LOADING" when remote scripts hang on mobile/content://.
   Tries primary CDN, then local ./three.min.js (offline), then alternates.
───────────────────────────────────────────────────────────────────────────── */
(function(){
  const sources=[
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
    './three.min.js',
    'https://unpkg.com/three@0.128.0/build/three.min.js',
    'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js'
  ];
  const perSourceTimeoutMs=3500;

  function loadScriptWithTimeout(src){
    return new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src=src;
      s.async=true;
      let done=false;
      const t=setTimeout(()=>{
        if(done) return;
        done=true;
        try{s.remove();}catch(e){}
        reject(new Error('timeout'));
      }, perSourceTimeoutMs);
      s.onload=()=>{
        if(done) return;
        done=true;
        clearTimeout(t);
        resolve(src);
      };
      s.onerror=()=>{
        if(done) return;
        done=true;
        clearTimeout(t);
        try{s.remove();}catch(e){}
        reject(new Error('error'));
      };
      document.head.appendChild(s);
    });
  }

  let chain=Promise.reject();
  for(const src of sources){
    chain = chain.catch(()=>loadScriptWithTimeout(src));
  }

  // Expose a promise the game bootloader can await.
  window.__cybrk_three_ready = chain.then((src)=>{
    console.log('[CYBRK] THREE loaded from', src);
    return true;
  }).catch((e)=>{
    console.warn('[CYBRK] THREE failed to load', e);
    return false;
  });
})();
</script>

   ASYNC GIFLER LOADER (GIF ANIMATION SUPPORT)
   Tries CDN then local ./gifler.min.js (offline).
───────────────────────────────────────────────────────────────────────────── */
(function(){
  // If already present, resolve immediately.
  if(typeof window.gifler === 'function'){
    window.__cybrk_gifler_ready = Promise.resolve(true);

  const sources=[
    'https://unpkg.com/gifler@0.1.0/gifler.min.js',

  ];
  const perSourceTimeoutMs=3500;

  function loadScriptWithTimeout(src){
    return new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src=src;
      s.async=true;
      let done=false;
      const t=setTimeout(()=>{
        if(done) return;
        done=true;
        try{s.remove();}catch(e){}
        reject(new Error('timeout'));
      }, perSourceTimeoutMs);
      s.onload=()=>{
        if(done) return;
        done=true;

        resolve(src);
      };
      s.onerror=()=>{
        if(done) return;
        done=true;
        clearTimeout(t);
        try{s.remove();}catch(e){}
        reject(new Error('error'));
      };
      document.head.appendChild(s);
    });
  }

  let chain=Promise.reject();
  for(const src of sources){

const RAF = window.requestAnimationFrame || window.webkitRequestAnimationFrame || function(cb){

};
const CAF = window.cancelAnimationFrame || window.webkitCancelAnimationFrame || function(id){

  if(_loopDriver==='timer') return;

  if(_timerLoop) clearInterval(_timerLoop);

function _startLoop(){
  _loopDriver='raf';

  if(_startLoop._bootTimeout) clearTimeout(_startLoop._bootTimeout);

  _startLoop._bootTimeout=setTimeout(()=>{ if(_frames < 2) _switchToTimerLoop(); }, 1200);

// ── SHOCKWAVE POOL (3D) ───────────────────────────────────────────────────────
const MAX_SHOCKWAVES=16;
let shockwavePool=[];
let activeShockwaves=[];
function buildShockwavePool(){
  for(let i=0;i<MAX_SHOCKWAVES;i++){
    const geo=new THREE.RingGeometry(1,1.18,40);
    const mat=new THREE.MeshBasicMaterial({
      color:0x00f7ff,transparent:true,opacity:0,
      side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false});
    const m=new THREE.Mesh(geo,mat);
    m.visible=false;scene.add(m);
    shockwavePool.push(m);
  }
}
function spawnShockwave(gx,gy,hexColor,maxR=90,startR=5){
  const free=shockwavePool.find(m=>!m.visible);
  if(!free)return;
  const col=typeof hexColor==='string'?parseInt(hexColor.replace('#',''),16):hexColor;
  free.visible=true;
  free.material.color.setHex(col);
  free.material.opacity=0.85;
  free.position.set(g3x(gx),g3y(gy),4);
  free.rotation.x=0;
  free.scale.set(startR,startR,1);
  activeShockwaves.push({mesh:free,r:startR,maxR,life:1,col});
  // Spawn a second, slightly delayed outer ring
  const free2=shockwavePool.find(m=>!m.visible&&m!==free);
  if(free2){
    free2.visible=true;
    free2.material.color.setHex(col);
    free2.material.opacity=0.5;
    free2.position.set(g3x(gx),g3y(gy),3);
    free2.scale.set(startR*.6,startR*.6,1);
    activeShockwaves.push({mesh:free2,r:startR*.6,maxR:maxR*.8,life:0.7,col,delay:3});
  }
}
function updateShockwaves(dt){
  for(let i=activeShockwaves.length-1;i>=0;i--){
    const sw=activeShockwaves[i];
    if(sw.delay&&sw.delay>0){sw.delay-=dt;continue;}
    sw.r+=4.8*dt;
    sw.life-=0.038*dt;
    if(sw.life<=0||sw.r>sw.maxR){
      sw.mesh.visible=false;
      activeShockwaves.splice(i,1);
    } else {
      sw.mesh.scale.set(sw.r,sw.r,1);
      sw.mesh.material.opacity=sw.life*0.7;
    }
  }
}

      blending:THREE.AdditiveBlending,depthWrite:false,linewidth:2});

function flashLightning(gx1,gy1,gx2,gy2,hexColor){
  const free=lightningPool.find(l=>!l.line.visible);
  if(!free)return;
  const wx1=g3x(gx1),wy1=g3y(gy1),wx2=g3x(gx2),wy2=g3y(gy2);
  const n=12;
  const pts=[];
  for(let j=0;j<n;j++){
    const t=j/(n-1);
    const jitter=(t>0&&t<1)?18:0;
    pts.push(new THREE.Vector3(
      wx1+(wx2-wx1)*t+(Math.random()-.5)*jitter,
      wy1+(wy2-wy1)*t+(Math.random()-.5)*jitter*0.7,
      6+Math.random()*4));
  }
  free.line.geometry.setFromPoints(pts);
  const col=typeof hexColor==='string'?parseInt(hexColor.replace('#',''),16):hexColor;
  free.line.material.color.setHex(col);
  free.line.material.opacity=1.0;
  free.line.visible=true;
  free.timer=8;
}
function updateLightning(){
  for(const l of lightningPool){
    if(!l.line.visible)continue;
    l.timer--;
    l.line.material.opacity=l.timer/8*0.9;
    if(l.timer<=0)l.line.visible=false;
  }
}

// ── BALL TRAJECTORY / LANDING PREDICTOR ──────────────────────────────────────
// Goal: the bottom "landing dot" must match the real physics *exactly*.
// Old code used a simplified preview (and in BALL POV it used the *last* point
// of a fixed-horizon path), which cannot represent the first paddle-line hit.
//
// This predictor simulates the same order as update():
//  1) integrate position
//  2) wall/top bounces
//  3) (optional) brick collisions & brick HP reduction (ghost passes through)
//  4) detect first time the ball center reaches yTarget = paddle.y - BALL_R - 1
//
// NOTE: This is a preview only — it does not spawn particles, score, or powerups.

let _predFrame=-1, _predBall=null;
let _predObj={pts:[], landX:null};

function getBallPrediction(ball){
  if(_predFrame===fc && _predBall===ball) return _predObj;
  _predFrame=fc; _predBall=ball;
  _predObj = predictBallToPaddle(ball);
  return _predObj;
}

function predictBallToPaddle(ball){
  const pts=[];
  let x=ball.x, y=ball.y, vx=ball.vx, vy=ball.vy;

  // Match the game's speed clamping so prediction doesn't drift on low/high FPS.
  const spMul = (AP.slow>0)?0.6:(AP.fast>0?1.45:1);
  const tsp = (BASE_SPD+(level-1)*.15)*spMul;

  const yTarget = paddle.y - BALL_R - 1;

  // Substep for accuracy (reduces overshoot error at low FPS / high speed)
  const dtp = Math.max(0.35, Math.min(2.8, _lastDT||1)); // match current frame dt
  const maxSteps = 650;         // covers long bounce chains safely
  const maxPts = 240;
  const sampleEvery = Math.max(1, Math.floor(maxSteps/maxPts)); // downsample path for rendering

  // Build a fast brick grid (only checks up to 4 cells per step)
  const cellW = BW + B_GAP;
  const cellH = BH + B_GAP;
  const grid = new Array(ROWS*COLS).fill(null);
  for(const b of bricks){
    if(!b || b.hp<=0) continue;
    const r = (b.r!=null)?b.r:Math.floor((b.y-B_TOP)/cellH);
    const c = (b.c!=null)?b.c:Math.floor((b.x-B_LEFT)/cellW);
    if(r>=0 && r<ROWS && c>=0 && c<COLS){
      grid[r*COLS+c] = {x:b.x,y:b.y,w:b.w,h:b.h,hp:b.hp,type:b.type};
    }
  }
  const ghost = (AP.ghost>0);

  let landX=null;
  let prevX=x, prevY=y;

  for(let i=0;i<maxSteps;i++){
    // Keep speed close to tsp (same intent as update())
    const cs=Math.hypot(vx,vy);
    if(cs>0 && Math.abs(cs-tsp)>.35){
      const r=tsp/cs; vx*=r; vy*=r;
    }

    prevX=x; prevY=y;
    x += vx*dtp;
    y += vy*dtp;

    // Walls + top
    if(x-BALL_R<0){ x=BALL_R; vx=Math.abs(vx); }
    if(x+BALL_R>GW){ x=GW-BALL_R; vx=-Math.abs(vx); }
    if(y-BALL_R<0){ y=BALL_R; vy=Math.abs(vy); }

    // Bricks (grid-based)
    // Only check if we're in the brick band
    if(y+BALL_R >= B_TOP && y-BALL_R <= (B_TOP + ROWS*cellH)){
      let r0=Math.floor((y-BALL_R-B_TOP)/cellH);
      let r1=Math.floor((y+BALL_R-B_TOP)/cellH);
      let c0=Math.floor((x-BALL_R-B_LEFT)/cellW);
      let c1=Math.floor((x+BALL_R-B_LEFT)/cellW);
      r0=Math.max(0,Math.min(ROWS-1,r0));
      r1=Math.max(0,Math.min(ROWS-1,r1));
      c0=Math.max(0,Math.min(COLS-1,c0));
      c1=Math.max(0,Math.min(COLS-1,c1));

      let hitNonGhost=false;
      for(let rr=r0; rr<=r1; rr++){
        for(let cc=c0; cc<=c1; cc++){
          const idx=rr*COLS+cc;
          const bk=grid[idx];
          if(!bk) continue;

          // AABB overlap
          if(x+BALL_R<bk.x||x-BALL_R>bk.x+bk.w||y+BALL_R<bk.y||y-BALL_R>bk.y+bk.h) continue;

          if(!ghost){
            const cx=Math.max(bk.x,Math.min(x,bk.x+bk.w));
            const cy=Math.max(bk.y,Math.min(y,bk.y+bk.h));
            const dx=x-cx, dy=y-cy;
            if(Math.abs(dx)>=Math.abs(dy)){
              vx = (dx>0)?Math.abs(vx):-Math.abs(vx);
            } else {
              vy = (dy>0)?Math.abs(vy):-Math.abs(vy);
            }
            hitNonGhost=true;
          }

          // Damage breakables
          if(bk.hp<9999){
            bk.hp -= 1;
            if(bk.hp<=0) grid[idx]=null;
          }

          // update() breaks after first brick hit when not ghost
          if(hitNonGhost) break;
        }
        if(hitNonGhost) break;
      }
    }

    // Sample the path for rendering
    if(i%sampleEvery===0) pts.push({x,y,frac:i/maxSteps});

    // First time we reach paddle collision line
    if(prevY < yTarget && y >= yTarget){
      const denom = (y - prevY) || 1e-6;
      const t = (yTarget - prevY) / denom;
      landX = prevX + (x - prevX) * t;
      landX = Math.max(BALL_R, Math.min(GW-BALL_R, landX));
      pts.push({x:landX, y:yTarget, frac:(i+t)/maxSteps});
      break;
    }

    // If we ever fall way below the arena, stop (lost ball path)
    if(y - BALL_R > GH + 80) break;
  }

  return {pts, landX};
}

// ── Ball factory (was missing in original; without this the game crashes on launch)
function mkBall(x,y,vx,vy){
  return {
    x:+x, y:+y,

    // Trail ring-buffer (zero-GC per frame)
    trailX:new Float32Array(TRAIL_LEN),
    trailY:new Float32Array(TRAIL_LEN),
    trailI:0,   // next write index
    trailN:0,   // valid sample count (<=TRAIL_LEN)

  };
}
function trailAdd(b,x,y){
  const i=b.trailI;
  b.trailX[i]=x; b.trailY[i]=y;
  b.trailI=(i+1)%TRAIL_LEN;
  if(b.trailN<TRAIL_LEN) b.trailN++;
}

// ── BRICKS ────────────────────────────────────────────────────────────────────
function buildLevel(lv){
  bricks=[];
  const lay=LEVELS[Math.min(lv-1,LEVELS.length-1)];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const tp=lay[r][c];if(!tp||!BC[tp])continue;
    const cf=BC[tp];
    bricks.push({x:B_LEFT+c*(BW+B_GAP),y:B_TOP+r*(BH+B_GAP),
      w:BW,h:BH,type:tp,hp:cf.hp,maxHp:cf.hp,col:cf.col,hex:cf.hex,
      sc:cf.sc,hitT:0,r,c,mesh:null});
  }
  buildBricks3D();

// ── COLLISION ─────────────────────────────────────────────────────────────────
function colBallBrick(ball,b){
  if(ball.x+BALL_R<b.x||ball.x-BALL_R>b.x+b.w)return false;
  if(ball.y+BALL_R<b.y||ball.y-BALL_R>b.y+b.h)return false;
  if(AP.ghost>0)return true;
  const cx=Math.max(b.x,Math.min(ball.x,b.x+b.w));
  const cy=Math.max(b.y,Math.min(ball.y,b.y+b.h));
  const dx=ball.x-cx,dy=ball.y-cy;
  if(Math.abs(dx)>=Math.abs(dy)){ball.vx=dx>0?Math.abs(ball.vx):-Math.abs(ball.vx);}
  else{ball.vy=dy>0?Math.abs(ball.vy):-Math.abs(ball.vy);}
  return true;
}
function colBallPad(ball){
  if(ball.vy<0)return false;
  if(ball.y+BALL_R<paddle.y||ball.y-BALL_R>paddle.y+PAD_H)return false;
  if(ball.x+BALL_R<paddle.x||ball.x-BALL_R>paddle.x+paddle.w)return false;
  if(AP.magnet>0){
    ball.vx=0;ball.vy=0;
    ball.x=Math.max(paddle.x+BALL_R,Math.min(ball.x,paddle.x+paddle.w-BALL_R));
    ball.y=paddle.y-BALL_R-1;ball.caught=true;return true;
  }
  const rel=((ball.x-paddle.x)/paddle.w)*2-1;
  const maxA=72*Math.PI/180;
  const a=rel*maxA,sp=Math.hypot(ball.vx,ball.vy);
  ball.vx=Math.sin(a)*sp;ball.vy=-Math.abs(Math.cos(a)*sp);
  ball.y=paddle.y-BALL_R-1;snd('pad');return true;
}

// ── BRICK HIT ─────────────────────────────────────────────────────────────────
function hitBrick(b,idx){
  if(b.hp>=9999){snd('steel');b.hitT=7;shake(1.2);spawnShockwave(b.x+b.w/2,b.y+b.h/2,b.col,40,3);return;}
  b.hp--;b.hitT=9;combo++;comboT=COMBO_TO;
  if(b.hp<=0){
    const pts=b.sc*mult*Math.max(1,1+Math.floor(combo/5));
    score+=pts;
    spawnP(b.x+b.w/2,b.y+b.h/2,b.col,b.type===7?80:36);
    spawnST(b.x+b.w/2,b.y,'+'+pts,b.col);
    if(b.type===7){snd('megabreak');shake(16);triggerEpicFlash('flash-red');}
    else{snd('break');shake(b.type===7?10:4);}
    if(b.mesh)b.mesh.visible=false;
    bricks.splice(idx,1);
    // Epic break effects
    triggerMegaBreak(b,pts);
    if(b.type===5)explodeNear(b);
    if(b.type===6)dropPow(b.x+b.w/2,b.y+b.h);
    else if(b.type!==4&&Math.random()<.16)dropPow(b.x+b.w/2,b.y+b.h);
    // Check boss mode (level 7+ has type 7 bricks)
    const hasBoss=bricks.some(bk=>bk.type===7);
    if(hasBoss!==bossMode)setBossMode(hasBoss);
  } else {
    snd('hit');shake(.8);
    spawnShockwave(b.x+b.w/2,b.y+b.h/2,b.col,35,3);
    if(Math.random()<.06)dropPow(b.x+b.w/2,b.y+b.h);
  }
}
function explodeNear(src){
  snd('boom');shake(8);spawnP(src.x+src.w/2,src.y+src.h/2,'#ffb020',40);
  const range=(BW+B_GAP)*1.9,sx=src.x+src.w/2,sy=src.y+src.h/2;
  for(let i=bricks.length-1;i>=0;i--){
    const b=bricks[i];if(b.type===4)continue;
    if(Math.abs(b.x+b.w/2-sx)<range&&Math.abs(b.y+b.h/2-sy)<range){
      b.hp-=2;spawnP(b.x+b.w/2,b.y+b.h/2,b.col,15);
      if(b.hp<=0){score+=b.sc*mult;spawnST(b.x+b.w/2,b.y,'+'+b.sc,b.col);
        if(b.mesh)b.mesh.visible=false;bricks.splice(i,1);}
    }
  }
}

function dropPow(x,y,forced){
  const tp=forced||PT[Math.floor(Math.random()*PT.length)];
  pows.push({x:x-PW/2,y,w:PW,h:PH,type:tp,col:PCOL[tp],hex:PHEX[tp],sym:PSYM[tp],mesh:null});
}
function collectPow(pw){
  snd('pu');spawnSpark(pw.x+pw.w/2,pw.y+pw.h/2,pw.col);
  spawnST(pw.x+pw.w/2,pw.y,pw.sym+' '+pw.type.toUpperCase(),pw.col);
  spawnShockwave(pw.x+pw.w/2,pw.y+pw.h/2,pw.col,70,5);
  triggerEpicFlash('flash-cyan');
  const tp=pw.type,fr=PDR[tp]||600;
  switch(tp){
    case'wide':   AP.wide=fr;AP.narrow=0;paddle.w=Math.min(paddle.bw*1.75,GW-20);break;
    case'narrow': AP.narrow=fr;AP.wide=0;paddle.w=Math.max(paddle.bw*.52,38);break;
    case'multi':{const nb=[];balls.forEach(b=>{if(b.active){
        nb.push(mkBall(b.x,b.y,b.vx*.9,b.vy-.6));
        nb.push(mkBall(b.x,b.y,-b.vx*.9,b.vy-.6));}});balls.push(...nb);break;}
    case'laser':  AP.laser=fr;break;
    case'shield': AP.shield=true;break;
    case'slow':   AP.slow=fr;AP.fast=0;break;
    case'fast':   AP.fast=fr;AP.slow=0;break;
    case'life':   lives=Math.min(lives+1,7);shake(6);spawnST(GW/2,GH/2,'♥ +1 LIFE','#3dff8a');break;
    case'bomb':   bombAll();break;
    case'ghost':  AP.ghost=fr;break;
    case'magnet': AP.magnet=fr;break;
    case'score2x':AP.score2x=fr;mult=2;break;
  }
}
function bombAll(){
  snd('boom');shake(16);
  triggerEpicFlash('flash-white');
  setTimeout(()=>triggerRGBFlash(),80);
  spawnShockwave(GW/2,GH/2,'#ffb020',220,10);
  spawnShockwave(GW/2,GH/2,'#ff4d6d',160,8);
  bricks.filter(b=>b.type!==4).sort(()=>Math.random()-.5).slice(0,9).forEach((b,i)=>{
    setTimeout(()=>{
      spawnP(b.x+b.w/2,b.y+b.h/2,b.col,45);score+=b.sc*mult;
      spawnST(b.x+b.w/2,b.y,'+'+b.sc,b.col);
      spawnShockwave(b.x+b.w/2,b.y+b.h/2,b.col,60,4);
      if(b.mesh)b.mesh.visible=false;b.hp=0;
    },i*40);
  });
  bricks=bricks.filter(b=>b.hp>0);
}
function releaseCaught(){
  balls.forEach(b=>{if(b.caught){b.caught=false;
    const a=-Math.PI/2+(Math.random()-.5)*.35,sp=BASE_SPD+(level-1)*.15;
    b.vx=Math.cos(a)*sp;b.vy=Math.sin(a)*sp;}});
}
function freePowMesh(pw){if(pw.mesh){pw.mesh.visible=false;pw.mesh._use=false;pw.mesh=null;}}
function freeLsMesh(ls){if(ls.mesh){ls.mesh.visible=false;ls.mesh._use=false;ls.mesh=null;}}

// ── MAIN UPDATE ───────────────────────────────────────────────────────────────
function update(dt){
  fc++;updShake(dt);updP();updST();
  if(comboT>0){comboT-=dt;if(comboT<=0){combo=0;comboT=0;}}
  for(const k of['wide','narrow','laser','slow','fast','ghost','magnet','score2x']){
    if(AP[k]>0){AP[k]-=dt;if(AP[k]<=0){AP[k]=0;
      if(k==='wide'||k==='narrow')paddle.w=paddle.bw;
      if(k==='score2x')mult=1;
      if(k==='magnet')releaseCaught();}}
  }
  if(AP.laser>0){lsCool-=dt;if(lsCool<=0){
    const mx=paddle.x+paddle.w/2;
    lasers.push({x:mx-9,y:paddle.y,w:3,h:16,vy:-LSPD,mesh:null});
    lasers.push({x:mx+6,y:paddle.y,w:3,h:16,vy:-LSPD,mesh:null});
    snd('laser');lsCool=28;}}
  const kspd=(camMode!=='orbit')?15:9;
  if(keys['ArrowLeft']||keys['KeyA'])mouseX-=kspd*dt;
  if(keys['ArrowRight']||keys['KeyD'])mouseX+=kspd*dt;
  mouseX=Math.max(paddle.w/2,Math.min(GW-paddle.w/2,mouseX));
  // Cockpit mode: much tighter paddle response — you feel every movement instantly
  const padSnap=(camMode!=='orbit')?0.58:0.28;
  paddle.x+=(mouseX-paddle.w/2-paddle.x)*padSnap;
  paddle.x=Math.max(0,Math.min(GW-paddle.w,paddle.x));
  balls.forEach(b=>{if(b.caught){b.x=paddle.x+paddle.w/2;b.y=paddle.y-BALL_R-1;}});
  for(let i=pows.length-1;i>=0;i--){
    const pw=pows[i];pw.y+=PSPD*dt;
    if(pw.y+pw.h>=paddle.y&&pw.y<=paddle.y+PAD_H&&pw.x+pw.w>=paddle.x&&pw.x<=paddle.x+paddle.w){
      freePowMesh(pw);collectPow(pw);pows.splice(i,1);continue;}
    if(AP.shield&&pw.y+pw.h>=GH-12){freePowMesh(pw);pows.splice(i,1);continue;}
    if(pw.y>GH+20){freePowMesh(pw);pows.splice(i,1);}
  }
  for(let i=lasers.length-1;i>=0;i--){
    const ls=lasers[i];ls.y+=ls.vy*dt;
    if(ls.y+ls.h<0){freeLsMesh(ls);lasers.splice(i,1);continue;}
    let hit=false;
    for(let j=bricks.length-1;j>=0;j--){
      const b=bricks[j];
      if(ls.x+ls.w<b.x||ls.x>b.x+b.w||ls.y+ls.h<b.y||ls.y>b.y+b.h)continue;
      hitBrick(b,j);hit=true;break;}
    if(hit){freeLsMesh(ls);lasers.splice(i,1);}
  }
  const tsp=(BASE_SPD+(level-1)*.15)*(AP.slow>0?.6:AP.fast>0?1.45:1);
  for(let bi=balls.length-1;bi>=0;bi--){
    const b=balls[bi];if(!b.active||b.caught)continue;
    const cs=Math.hypot(b.vx,b.vy);
    if(cs>0&&Math.abs(cs-tsp)>.35){const r=tsp/cs;b.vx*=r;b.vy*=r;}
    trailAdd(b,b.x,b.y);
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.x-BALL_R<0){b.x=BALL_R;b.vx=Math.abs(b.vx);snd('wall');}
    if(b.x+BALL_R>GW){b.x=GW-BALL_R;b.vx=-Math.abs(b.vx);snd('wall');}
    if(b.y-BALL_R<0){b.y=BALL_R;b.vy=Math.abs(b.vy);snd('wall');}
    if(AP.shield&&b.y+BALL_R>=GH-12&&b.vy>0){
      b.vy=-Math.abs(b.vy);b.y=GH-12-BALL_R;AP.shield=false;shake(5);snd('pad');}
    colBallPad(b);
    for(let j=bricks.length-1;j>=0;j--){
      const bk=bricks[j];
      if(colBallBrick(b,bk)){hitBrick(bk,j);if(AP.ghost<=0)break;}}
    if(b.y-BALL_R>GH)b.active=false;
  }
  const hasCaught=balls.some(b=>b.active&&b.caught);
  balls=balls.filter(b=>b.active);
  dangerPulse=balls.some(b=>b.y>GH*.75)?Math.min(1,dangerPulse+(.06*dt)):Math.max(0,dangerPulse-(.04*dt));
  if(balls.length===0&&!hasCaught&&state==='playing')ballLost();
  if(state==='playing'&&bricks.filter(b=>b.hp<9999).length===0&&!lvTransit)lvComplete();
}

function ballLost(){
  lives--;perfectLv=false;snd('lost');shake(15);
  if(lives<=0){state='gameOver';if(score>hi)hi=score;try{localStorage.setItem('cybrk_hi',hi);}catch(e){}snd('go');}
  else{resetRound();state='launch';}
}
function resetRound(){
  paddle.w=paddle.bw;paddle.x=GW/2-paddle.bw/2;mouseX=GW/2;
  pows=[];lasers=[];
  for(const k of Object.keys(AP))AP[k]=typeof AP[k]==='number'?0:false;
  mult=1;combo=0;balls=[];
  poolPow.forEach(m=>{m.visible=false;m._use=false;});
  poolLas.forEach(m=>{m.visible=false;m._use=false;});
}
function lvComplete(){
  if(lvTransit)return;
  lvTransit=true;snd('lv');state='levelComplete';shake(10);
  triggerWarpEffect();
  setBossMode(false);
  const lb=level*500,pb=perfectLv?level*1000:0;
  score+=lb+pb;spawnST(GW/2,GH/2,'LEVEL BONUS +'+lb,'#3dff8a');
  if(pb)setTimeout(()=>spawnST(GW/2,GH/2-32,'PERFECT BONUS +'+pb,'#ffb020'),400);
  setTimeout(()=>{
    lvTransit=false;
    if(level>=9){state='victory';if(score>hi)hi=score;
      try{localStorage.setItem('cybrk_hi',hi);}catch(e){}snd('win');
      triggerEpicFlash('flash-gold');}
    else{level++;startLevel();}
  },2700);
}
function startLevel(){
  perfectLv=true;buildLevel(level);
  paddle.w=paddle.bw;paddle.x=GW/2-paddle.bw/2;mouseX=GW/2;
  pows=[];lasers=[];parts=[];stxts=[];
  for(const k of Object.keys(AP))AP[k]=typeof AP[k]==='number'?0:false;
  mult=1;combo=0;balls=[];state='launch';
  poolPow.forEach(m=>{m.visible=false;m._use=false;});
  poolLas.forEach(m=>{m.visible=false;m._use=false;});
  // Boss mode for levels with type 7 bricks
  const hasBoss=bricks.some(b=>b.type===7);
  setBossMode(hasBoss);
  if(hasBoss){triggerEpicFlash('flash-red');setTimeout(()=>snd('boom'),200);}
}
function startGame(){
  score=0;lives=3;level=1;combo=0;mult=1;
  parts=[];stxts=[];pows=[];lasers=[];
  setBossMode(false);
  startLevel();getAC();
  // Enable ambient music
  ambMusicActive=true;
  ambMusicTimer=60;
  ambChordIdx=0;
}

// PANORAMIC SKYBOX — procedural equirectangular canvas texture on sphere
// ═════════════════════════════════════════════════════════════════════════════
function createSkyboxTexture(){
  const dpr=(window.devicePixelRatio||1);
  const lowMem = (navigator.deviceMemory && navigator.deviceMemory<=4) || (navigator.hardwareConcurrency && navigator.hardwareConcurrency<=4);
  const smallScreen = Math.max(window.innerWidth,window.innerHeight)*dpr <= 1100;
  const W=(lowMem||smallScreen)?1024:2048;
  const H=(lowMem||smallScreen)?512:1024;
  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  const c=cv.getContext('2d');

  // ── Rich deep space base ──
  const bgGrad=c.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#000008');
  bgGrad.addColorStop(0.5,'#000003');
  bgGrad.addColorStop(1,'#000010');
  c.fillStyle=bgGrad;c.fillRect(0,0,W,H);

  // ── LARGE vivid nebula clouds ─────────────────────────────
  // Paint with high opacity + multiple layers for depth
  const nebs=[
    // Big cyan dome top-left
    {x:.08,y:.22,rx:.45,ry:.38,r:0,g:220,b:255,a:.65},
    {x:.08,y:.22,rx:.28,ry:.22,r:0,g:247,b:255,a:.8},
    // Purple mega-cloud right
    {x:.72,y:.28,rx:.42,ry:.36,r:160,g:0,b:255,a:.60},
    {x:.78,y:.20,rx:.24,ry:.20,r:200,g:40,b:255,a:.75},
    // Orange/red explosion lower-right
    {x:.82,y:.72,rx:.38,ry:.32,r:255,g:80,b:0,a:.65},
    {x:.88,y:.78,rx:.22,ry:.18,r:255,g:140,b:20,a:.80},
    // Teal cloud lower-left
    {x:.18,y:.75,rx:.36,ry:.28,r:0,g:200,b:180,a:.60},
    {x:.12,y:.80,rx:.20,ry:.16,r:0,g:255,b:200,a:.75},
    // Pink center band
    {x:.50,y:.50,rx:.55,ry:.18,r:220,g:60,b:180,a:.38},
    // Blue deep core
    {x:.45,y:.35,rx:.30,ry:.25,r:20,g:80,b:255,a:.55},
    // Extra cyan burst top-right
    {x:.88,y:.15,rx:.25,ry:.22,r:0,g:200,b:255,a:.58},
    // Gold/yellow accent
    {x:.35,y:.82,rx:.22,ry:.16,r:255,g:210,b:0,a:.48},
    // Extra: magenta upper-center
    {x:.50,y:.15,rx:.20,ry:.18,r:255,g:50,b:180,a:.45},
    // Extra: deep blue lower-center
    {x:.55,y:.85,rx:.28,ry:.20,r:30,g:50,b:255,a:.50},
    // Extra: bright white-core supernova left
    {x:.20,y:.45,rx:.18,ry:.15,r:200,g:230,b:255,a:.55},
  ];
  for(const n of nebs){
    c.save();c.translate(n.x*W,n.y*H);c.scale(n.rx*W,n.ry*H);
    const g=c.createRadialGradient(0,0,0,0,0,1);
    g.addColorStop(0,`rgba(${n.r},${n.g},${n.b},${n.a})`);
    g.addColorStop(.35,`rgba(${Math.round(n.r*.7)},${Math.round(n.g*.7)},${Math.round(n.b*.7)},${n.a*.6})`);
    g.addColorStop(.7,`rgba(${Math.round(n.r*.3)},${Math.round(n.g*.3)},${Math.round(n.b*.3)},${n.a*.2})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=g;c.beginPath();c.arc(0,0,1,0,Math.PI*2);c.fill();
    c.restore();
  }

  // ── Vivid galactic band (equatorial ribbon) ──
  c.save();c.globalAlpha=0.55;
  const band=c.createLinearGradient(0,H*.38,0,H*.62);
  band.addColorStop(0,'rgba(0,0,0,0)');
  band.addColorStop(.25,'rgba(80,20,160,1)');
  band.addColorStop(.5,'rgba(0,180,220,1)');
  band.addColorStop(.75,'rgba(80,20,160,1)');
  band.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=band;c.fillRect(0,0,W,H);
  c.restore();

  // ── Bright neon grid (signature cyber look) ──
  // Major grid — BRIGHT CYAN
  c.strokeStyle='rgba(0,247,255,0.55)';c.lineWidth=1.6;
  c.beginPath();
  for(let x=0;x<W;x+=80){c.moveTo(x,0);c.lineTo(x,H);}
  for(let y=0;y<H;y+=80){c.moveTo(0,y);c.lineTo(W,y);}
  c.stroke();

  // Minor grid — softer
  c.strokeStyle='rgba(0,200,255,0.18)';c.lineWidth=0.7;
  c.beginPath();
  for(let x=0;x<W;x+=20){if(x%80)c.moveTo(x,0),c.lineTo(x,H);}
  for(let y=0;y<H;y+=20){if(y%80)c.moveTo(0,y),c.lineTo(W,y);}
  c.stroke();

  // ── Bright glowing nodes at intersections ──
  for(let x=0;x<=W;x+=80) for(let y=0;y<=H;y+=80){
    const sz=x%160===0&&y%160===0?20:10;
    const br=x%160===0&&y%160===0?0.95:0.45+Math.random()*.45;
    const g=c.createRadialGradient(x,y,0,x,y,sz);
    g.addColorStop(0,`rgba(0,247,255,${br})`);
    g.addColorStop(.5,`rgba(0,200,255,${br*.4})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=g;c.fillRect(x-sz,y-sz,sz*2,sz*2);
  }

  // ── Purple diagonal streaks ──
  c.save();c.globalAlpha=0.35;
  c.strokeStyle='rgba(200,80,255,1)';c.lineWidth=1.5;c.setLineDash([8,18]);
  c.beginPath();
  for(let i=0;i<10;i++){
    const x=(i/10)*W;
    c.moveTo(x,0);c.lineTo(x+W*.12,H);
  }
  c.stroke();c.setLineDash([]);c.restore();

  // ── Bright orange energy lines ──
  c.save();c.globalAlpha=0.28;
  c.strokeStyle='rgba(255,140,0,1)';c.lineWidth=1.2;c.setLineDash([5,22]);
  c.beginPath();
  for(let i=0;i<6;i++){const y=(i/6)*H+H*.08;c.moveTo(0,y);c.lineTo(W,y+80*(Math.random()-.5));}
  c.stroke();c.setLineDash([]);c.restore();

  // ── Dense star field (multiple brightness tiers) ──
  const sTiers=[
    {n:5000,maxR:.65,minA:.18,maxA:.55,warm:.2},
    {n:2000,maxR:1.3,minA:.45,maxA:.85,warm:.3},
    {n:500, maxR:2.0,minA:.65,maxA:.95,warm:.4},
    {n:100, maxR:3.5,minA:.90,maxA:1.0,warm:.6},
  ];
  for(const cfg of sTiers){
    for(let i=0;i<cfg.n;i++){
      const x=Math.random()*W,y=Math.random()*H;
      const r=Math.random()*cfg.maxR+.35;
      const a=cfg.minA+Math.random()*(cfg.maxA-cfg.minA);
      const warm=Math.random()<cfg.warm;
      c.fillStyle=warm?`rgba(255,230,160,${a})`:`rgba(200,225,255,${a})`;
      c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();
    }
  }

  // ── Superbright star bursts (like in ZERODRIFT reference) ──
  for(let i=0;i<40;i++){
    const x=Math.random()*W,y=Math.random()*H;
    const sz=4+Math.random()*6;
    // Core
    const g2=c.createRadialGradient(x,y,0,x,y,sz);
    g2.addColorStop(0,'rgba(255,255,255,1)');
    g2.addColorStop(.2,'rgba(200,240,255,0.9)');
    g2.addColorStop(.6,'rgba(100,200,255,0.3)');
    g2.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=g2;c.fillRect(x-sz,y-sz,sz*2,sz*2);
    // Spike cross
    const sp=sz*3.5;
    c.save();c.strokeStyle='rgba(255,255,255,0.6)';c.lineWidth=.8;
    c.beginPath();c.moveTo(x-sp,y);c.lineTo(x+sp,y);c.moveTo(x,y-sp);c.lineTo(x,y+sp);c.stroke();
    // Diagonal spikes (45°)
    c.globalAlpha=0.3;c.strokeStyle='rgba(200,230,255,1)';
    const d=sp*.6;
    c.beginPath();c.moveTo(x-d,y-d);c.lineTo(x+d,y+d);c.moveTo(x+d,y-d);c.lineTo(x-d,y+d);c.stroke();
    c.restore();
  }

  // ── Bright lens-flare rings (sci-fi atmosphere) ──
  for(let i=0;i<8;i++){
    const x=Math.random()*W,y=Math.random()*H;
    const r=30+Math.random()*80;
    const cols=['rgba(0,247,255,','rgba(177,76,255,','rgba(255,140,0,'];
    const col=cols[Math.floor(Math.random()*cols.length)];
    c.save();c.strokeStyle=col+'0.35)';c.lineWidth=1.5;
    c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.stroke();
    c.strokeStyle=col+'0.15)';c.lineWidth=0.8;
    c.beginPath();c.arc(x,y,r*1.4,0,Math.PI*2);c.stroke();
    c.restore();
  }

  const tex=new THREE.CanvasTexture(cv);
  tex.needsUpdate=true;
  return tex;
}

  buildTrajLine();
  buildPaddle();
  buildObjectPools();
  buildShield();
  buildParticles();
  // ⚡ EPIC ADDITIONS ⚡
  buildShockwavePool();
  buildLightningPool();
  buildEnergyField();
}

// ── CAMERA UPDATE ─────────────────────────────────────────────────────────────
function updateCamera(){
  // camPhi: elevation angle (positive = above, negative = below)
  camPhi=Math.max(-1.25,Math.min(1.25,camPhi)); // allow orbit to go under/over the arena
  const sinP=Math.sin(camPhi),cosP=Math.cos(camPhi);
  const sinT=Math.sin(camTheta),cosT=Math.cos(camTheta);
  // Adaptive radius: farther on portrait screens so full arena fits
  const asp=window.innerWidth/window.innerHeight;
  const effR=asp<0.75?camR*1.45:asp<0.95?camR*1.18:camR;
  camera.position.set(
    CAM_TARGET.x + sinT*cosP*effR,
    CAM_TARGET.y + sinP*effR,       // positive phi → camera above target
    CAM_TARGET.z + cosT*cosP*effR
  );
  camera.lookAt(CAM_TARGET);
}

// ── COCKPIT (FIRST-PERSON) CAMERA UPDATE ─────────────────────────────────────
function updateCockpitCamera(){
  const t=timeE;
  const px3=g3x(paddle.x+paddle.w/2);
  const py3=g3y(paddle.y+PAD_H/2);

  // ── Lean: feels like a vehicle tilting into the turn ──────
  const padCenterX=paddle.x+paddle.w/2;
  // Clamp first-frame delta in case prevPaddleX was stale
  const rawDelta=padCenterX-prevPaddleX;
  const padVelX=Math.max(-30,Math.min(30,rawDelta));
  prevPaddleX=padCenterX;
  // Faster lean response — you FEEL the movement
  camLeanVel+=(padVelX*0.0022-camLeanVel)*0.35;
  camLean+=(camLeanVel*10-camLean)*0.18;
  camLean=Math.max(-0.32,Math.min(0.32,camLean));

  // ── Camera position: SNAP tightly to paddle X — instant control feel ─────
  // X: near-instant, so your view shifts AS your finger moves
  cockpitCamX+=(px3-cockpitCamX)*0.72;
  // Y: fixed height above paddle surface
  const camTargetY=py3+28;
  cockpitCamY+=(camTargetY-cockpitCamY)*0.5;
  // Z: stand back far enough to see the full arena — like being at the controls
  const camZ=160;

  // ── Look-at: blend ball tracking + YOUR position to confirm you're steering ─
  const aBall=balls.find(b=>b.active);
  let tLX=px3, tLY=120, tLZ=0;
  if(aBall){
    const bx3=g3x(aBall.x);
    const by3=g3y(aBall.y);
    // Look-at X: 60% toward ball, 40% toward where YOU just moved
    // This means moving the paddle visibly shifts your aim — confirms control
    tLX = bx3*0.6 + px3*0.4;
    // Look-at Y: track ball height but keep a minimum upward angle
    tLY = Math.max(by3, py3+80);
    tLZ = 0;
  } else {
    // No ball (launch state): look straight ahead toward bricks
    tLX=px3*0.5;
    tLY=180;
  }
  // Much faster look-at response — 0.28 instead of 0.09
  cockpitLookX+=(tLX-cockpitLookX)*0.28;
  cockpitLookY+=(tLY-cockpitLookY)*0.22;

  // Manual look offset (right-drag / two-finger) — drifts back gently when released
  if(!rightDragActive){
    cockpitLookOffX*=0.92;
    cockpitLookOffY*=0.92;
  }

  camera.position.set(cockpitCamX, cockpitCamY, camZ);
  camera.lookAt(cockpitLookX+cockpitLookOffX, cockpitLookY+cockpitLookOffY, tLZ);

  // Lean roll — feel the G-force of your movement
  camera.rotateZ(-camLean);

  // Shake stays in cockpit space — impactful hits
  if(shakeAmt>0.1){
    camera.position.x+=shakeX*0.22;
    camera.position.y+=shakeY*0.22;
  }
}


// ── BALL POV CAMERA UPDATE ───────────────────────────────────────────────────
// Camera position is locked to the active ball and looks along its velocity.
// If no active ball exists (rare), we fall back to cockpit-style forward view.
function updateBallCamera(){
  // Choose a representative "main" ball
  const b = balls.find(bb=>bb.active) || (state==='launch' ? {
    x: paddle.x + paddle.w/2,
    y: paddle.y - BALL_R - 2,
    vx: 0,
    vy: -1
  } : null);

  if(!b){
    // Nothing to follow → use orbit fallback so we never freeze
    updateCamera();
    return;
  }

  const bx3=g3x(b.x), by3=g3y(b.y);

  // Convert game velocity to world velocity (world y is inverted relative to game y)
  let vxw=b.vx, vyw=-b.vy;
  let vl=Math.hypot(vxw,vyw);
  if(vl<0.0001){ vxw=0; vyw=1; vl=1; }
  vxw/=vl; vyw/=vl;

  // Desired camera position: ride the ball with a slight offset toward camera (positive Z)
  const tx = bx3;
  const ty = by3;

  // TRUE BALL POV: lock camera EXACTLY to the ball (no smoothing, no lag).
  // This makes the camera match the ball's position and facing every frame.
  ballCamX = tx;
  ballCamY = ty;

  // Look target: straight ahead in the ball's travel direction (exact).
  const lookDist = 165;
  const tLX = bx3 + vxw * lookDist;
  const tLY = by3 + vyw * lookDist;

  ballLookX = tLX;
  ballLookY = tLY;

  // Manual look offset (right-drag / two-finger) — same control as cockpit, but gentler
  if(!rightDragActive){
    cockpitLookOffX *= 0.92;
    cockpitLookOffY *= 0.92;
  }

  camera.position.set(ballCamX, ballCamY, BALL_CAM_Z);
  camera.lookAt(ballLookX + cockpitLookOffX*0.55, ballLookY + cockpitLookOffY*0.55, 0);

  // Impact shake
  if(shakeAmt>0.1){
    camera.position.x += shakeX*0.22;
    camera.position.y += shakeY*0.22;
  }
}

// ── PANORAMIC SKYBOX ──────────────────────────────────────────────────────────
function buildSkybox(){
  const tex=createSkyboxTexture();
  // Large sphere, BackSide = render the inside surface = panoramic environment
  const geo=new THREE.SphereGeometry(2200,64,32);
  const mat=new THREE.MeshBasicMaterial({
    map:tex,
    side:THREE.BackSide,
    fog:false,        // skybox should NEVER be affected by fog
    depthWrite:false  // draw behind everything
  });
  skyboxMesh=new THREE.Mesh(geo,mat);
  skyboxMesh.renderOrder=-1;
  scene.add(skyboxMesh);
}

// ── ARENA ─────────────────────────────────────────────────────────────────────
function buildArena(){
  // Floor
  const flr=new THREE.Mesh(
    new THREE.PlaneGeometry(950,750),
    new THREE.MeshStandardMaterial({
      color:0x010a18,emissive:0x001428,emissiveIntensity:.7,
      metalness:.88,roughness:.32,transparent:true,opacity:.98}));
  flr.rotation.x=-Math.PI/2;flr.position.set(0,-295,-10);scene.add(flr);
  arenaFloorMesh=flr;

  // Floor grid (major lines)
  const gL=[];
  for(let x=-440;x<=440;x+=44){gL.push(x,-293,-360, x,-293,50);}
  for(let z=-360;z<=50;z+=40){gL.push(-440,-293,z, 440,-293,z);}
  const gG=new THREE.BufferGeometry();
  gG.setAttribute('position',new THREE.BufferAttribute(new Float32Array(gL),3));
  const gridMajor=new THREE.LineSegments(gG,new THREE.LineBasicMaterial({color:0x003a55,transparent:true,opacity:.55}));
  gridMajor.visible=false; // classic: remove floor mesh lines
  scene.add(gridMajor);

  // Floor grid (bright major)
  const bL=[];
  for(let x=-440;x<=440;x+=88){bL.push(x,-292,-360, x,-292,50);}
  for(let z=-360;z<=50;z+=80){bL.push(-440,-292,z, 440,-292,z);}
  const bG=new THREE.BufferGeometry();
  bG.setAttribute('position',new THREE.BufferAttribute(new Float32Array(bL),3));
  const gridBright=new THREE.LineSegments(bG,new THREE.LineBasicMaterial({color:0x00c8ff,transparent:true,opacity:.28}));
  gridBright.visible=false; // classic: remove floor mesh lines
  scene.add(gridBright);

  // Arena wire edges
  const AX=408,AY=295,AZ=22;
  const ep=[
    -AX,AY,-AZ, AX,AY,-AZ,  AX,AY,-AZ, AX,AY,AZ,
    AX,AY,AZ, -AX,AY,AZ,   -AX,AY,AZ, -AX,AY,-AZ,
    -AX,-AY,-AZ, AX,-AY,-AZ, AX,-AY,-AZ, AX,-AY,AZ,
    AX,-AY,AZ, -AX,-AY,AZ,  -AX,-AY,AZ, -AX,-AY,-AZ,
    -AX,AY,-AZ, -AX,-AY,-AZ, AX,AY,-AZ, AX,-AY,-AZ,
    AX,AY,AZ, AX,-AY,AZ,    -AX,AY,AZ, -AX,-AY,AZ,
  ];
  const eG=new THREE.BufferGeometry();
  eG.setAttribute('position',new THREE.BufferAttribute(new Float32Array(ep),3));
  scene.add(new THREE.LineSegments(eG,
    new THREE.LineBasicMaterial({color:0x00f7ff,transparent:true,opacity:.55})));

  // Glow strips
  const mkStrip=(geo,col,pos)=>{
    const m=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.7}));
    m.position.set(...pos);scene.add(m);
  };
  mkStrip(new THREE.BoxGeometry(820,5,5),0x00f7ff,[0,297,0]);
  mkStrip(new THREE.BoxGeometry(820,5,5),0xb14cff,[0,-297,0]);
  mkStrip(new THREE.BoxGeometry(5,594,5),0x00f7ff,[-410,0,0]);
  mkStrip(new THREE.BoxGeometry(5,594,5),0x00f7ff,[410,0,0]);

  // Transparent glass walls (SIDE WALLS ONLY — removes the “extra floating screen” artifact)
  arenaGlassWallMeshes.length=0;
  const wm=new THREE.MeshStandardMaterial({color:0x001830,emissive:0x002244,emissiveIntensity:.3,
    transparent:true,opacity:.06,side:THREE.DoubleSide});

  // Left wall (X-)
  const glassL=new THREE.Mesh(new THREE.PlaneGeometry(AZ*2,AY*2),wm);
  glassL.rotation.y=Math.PI/2;
  glassL.position.set(-AX,0,0);
  scene.add(glassL);
  arenaGlassWallMeshes.push(glassL);

  // Right wall (X+)
  const glassR=new THREE.Mesh(new THREE.PlaneGeometry(AZ*2,AY*2),wm);
  glassR.rotation.y=-Math.PI/2;
  glassR.position.set(AX,0,0);
  scene.add(glassR);
  arenaGlassWallMeshes.push(glassR);

  // Back wall
  const bw=new THREE.Mesh(new THREE.PlaneGeometry(820,594),
    new THREE.MeshStandardMaterial({color:0x010912,emissive:0x001530,emissiveIntensity:.5,
      transparent:true,opacity:.92}));
  bw.position.set(0,0,-AZ-2);scene.add(bw);
  arenaBackWallMesh=bw;
}

function toggleMediaPanel(force){
  const p=$id('mediaPanel');
  if(!p) return;
  const want = (typeof force==='boolean') ? force : !p.classList.contains('open');

  // UI interaction guard: while panel is open (or a file picker is active), ignore game clicks/taps.
  try{ __mediaPanelOpen = !!want; }catch(e){}
  if(want){
    p.classList.add('open');
    p.setAttribute('aria-hidden','false');
    uiBlock(650);
  } else {
    p.classList.remove('open');
    p.setAttribute('aria-hidden','true');
    uiBlock(220);
  }
}

// Keep the API on window so buttons can call it safely.
const MediaSkins = (function(){
  const SURF = Object.create(null);
  const MAX_TEX_SIZE = 1024; // safe on mobile; change to 512 if you need more FPS.
  let inited=false;

  function _makeCanvas(size){
    const c=document.createElement('canvas');
    c.width=size; c.height=size;
    const ctx=c.getContext('2d', {alpha:false});
    // default fill (keeps texture valid even before media)
    ctx.fillStyle='#050812';
    ctx.fillRect(0,0,size,size);
    return {c,ctx};
  }

  function _drawCover(ctx, media){
    const w=ctx.canvas.width, h=ctx.canvas.height;
    ctx.clearRect(0,0,w,h);
    // subtle dark base to avoid flashing while video warms up
    ctx.fillStyle='#050812';
    ctx.fillRect(0,0,w,h);

    const iw = media.naturalWidth || media.videoWidth || media.width || 0;
    const ih = media.naturalHeight || media.videoHeight || media.height || 0;
    if(!iw || !ih) return;
    const s = Math.max(w/iw, h/ih);
    const dw = iw*s, dh = ih*s;
    const dx = (w-dw)/2, dy=(h-dh)/2;
    try{ ctx.drawImage(media, dx, dy, dw, dh); }catch(e){}
  }

  function _disposeUrl(url){
    if(!url) return;
    try{ URL.revokeObjectURL(url); }catch(e){}
  }

  function _stopGif(s){
    if(s.gifAnim && typeof s.gifAnim.stop === 'function'){
      try{s.gifAnim.stop();}catch(e){}
    }
    s.gifAnim=null;
    s.gifActive=false;
  }

  function _stopVideo(s){
    if(s.video){
      try{ s.video.pause(); }catch(e){}
      s.video.src='';
      try{ s.video.load(); }catch(e){}
    }
    s.videoActive=false;
  }

  function _captureOldMaterials(meshes){
    const old=[];
    for(const m of meshes){
      if(!m) continue;
      old.push([m, m.material]);
    }
    return old;
  }

  function _restoreOldMaterials(s){
    if(!s || !s.oldMats) return;
    for(const [m,mat] of s.oldMats){
      try{ m.material = mat; }catch(e){}
    }
    s.applied=false;
    // Keep floor grid lines hidden (Classic preference)
    if(s.key==='floor' && s.gridLines && s.gridLines.length){
      for(const gl of s.gridLines){ try{ gl.visible=false; }catch(e){} }
    }
}

  function _applyMaterial(s){
    if(!s || s.applied) return;
    if(!s.mat) return;
    for(const m of s.meshes){
      try{ m.material = s.mat; }catch(e){}
    }
        // Hide floor grid lines when custom floor media is applied
    if(s.key==='floor' && s.gridLines && s.gridLines.length){
      for(const gl of s.gridLines){ try{ gl.visible=false; }catch(e){} }
    }
s.applied=true;
  }

  function _clearSurface(key){
    const s=SURF[key];
    if(!s) return;

    _stopGif(s);
    _stopVideo(s);
    if(s.img){ s.img.src=''; }

    _disposeUrl(s.url);
    s.url=null;
    s.kind='none';

    // restore original materials (so default look returns)
    _restoreOldMaterials(s);

    // reset canvas to dark base (prevents WebGL warnings on some GPUs)
    try{
      s.ctx.fillStyle='#050812';
      s.ctx.fillRect(0,0,s.canvas.width,s.canvas.height);
      s.tex.needsUpdate=true;
    }catch(e){}
  }

  // Hidden media elements (some mobile browsers decode more reliably if element exists)
  function makeHiddenImg(){
    const img=document.createElement('img');
    img.decoding='async'; img.loading='eager';
    // Keep it in DOM for decode reliability, but NEVER visible.
    // Offscreen + 1px + fully transparent prevents the "mini vertical screen" artifact on mobile.
    img.style.cssText='position:fixed;left:-99999px;top:-99999px;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1;';
    document.body.appendChild(img);
    return img;
  }
  function makeHiddenVideo(){
    const v=document.createElement('video');
    v.muted=true; v.loop=true; v.autoplay=true; v.volume=0;
    v.controls=false;
    v.setAttribute('muted',''); v.setAttribute('loop',''); v.setAttribute('autoplay','');
    v.preload='auto';
    v.playsInline=true; v.setAttribute('playsinline',''); v.setAttribute('webkit-playsinline','');
    // Prevent any visible video preview overlays on Android/iOS.
    v.disablePictureInPicture=true;
    v.setAttribute('disablepictureinpicture','');
    v.setAttribute('controlslist','nodownload noplaybackrate noremoteplayback');
    v.style.cssText='position:fixed;left:-99999px;top:-99999px;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1;';
    document.body.appendChild(v);
    return v;
  }

  function _makeCanvasTexture(canvas){
    const tex=new THREE.CanvasTexture(canvas);
    tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter;
    // Color correctness across three versions:
    try{
      // Newer three (r152+) uses colorSpace
      if(THREE.SRGBColorSpace && ('colorSpace' in tex)) tex.colorSpace = THREE.SRGBColorSpace;
      // Older three (r128) uses encoding
      if(THREE.sRGBEncoding && ('encoding' in tex)) tex.encoding = THREE.sRGBEncoding;
    }catch(e){}
    return tex;
  }

  function _findFloorGridLines(){
    const out=[];
    try{
      if(typeof scene==='undefined' || !scene || typeof scene.traverse!=='function') return out;
      scene.traverse(o=>{
        try{
          if(!o || o.type!=='LineSegments') return;
          const mat=o.material;
          if(!mat || !mat.color || !o.geometry || !o.geometry.attributes || !o.geometry.attributes.position) return;
          const hex = (typeof mat.color.getHex==='function') ? mat.color.getHex() : null;
          if(hex!==0x003a55 && hex!==0x00c8ff) return;
          const arr = o.geometry.attributes.position.array;
          if(!arr || arr.length<2) return;
          const y = arr[1];
          if(Math.abs(y+293)>3 && Math.abs(y+292)>3) return;
          out.push(o);
        }catch(e){}
      });
    }catch(e){}
    return out;
  }

  function _initSurfaces(){
    const size = MAX_TEX_SIZE;

    // FLOOR
    (function(){
      const {c,ctx}=_makeCanvas(size);
      const tex=_makeCanvasTexture(c);
      const meshes=[arenaFloorMesh].filter(Boolean);
      SURF.floor = {
        key:'floor',
        gridLines:[],
        meshes,
        oldMats:_captureOldMaterials(meshes),
        applied:false,
        canvas:c,ctx,tex,
        mat:(function(){const m=new THREE.MeshBasicMaterial({map:tex,color:0xffffff,transparent:false,opacity:1,side:THREE.DoubleSide});m.toneMapped=false;return m;})(),
        input:null,img:makeHiddenImg(),video:makeHiddenVideo(),
        kind:'none',url:null,gifAnim:null,gifActive:false,videoActive:false,
        lastUpd:0
      };
    })();

    try{ SURF.floor.gridLines = _findFloorGridLines(); }catch(e){}
    // Classic: never show the floor grid mesh lines
    try{ for(const gl of (SURF.floor.gridLines||[])){ if(gl) gl.visible=false; } }catch(e){}


    // WALLS (glass walls + back wall)
    (function(){
      const {c,ctx}=_makeCanvas(size);
      const tex=_makeCanvasTexture(c);
      const meshes=[arenaBackWallMesh, ...(arenaGlassWallMeshes||[])].filter(Boolean);
      SURF.walls = {
        key:'walls',
        meshes,
        oldMats:_captureOldMaterials(meshes),
        applied:false,
        canvas:c,ctx,tex,
        mat:(function(){const m=new THREE.MeshBasicMaterial({map:tex,color:0xffffff,transparent:false,opacity:1,side:THREE.DoubleSide});m.toneMapped=false;return m;})(),
        input:null,img:makeHiddenImg(),video:makeHiddenVideo(),
        kind:'none',url:null,gifAnim:null,gifActive:false,videoActive:false,
        lastUpd:0
      };
    })();

    // SPHERE (skybox)
    (function(){
      const {c,ctx}=_makeCanvas(size);
      const tex=_makeCanvasTexture(c);
      const meshes=[skyboxMesh].filter(Boolean);
      SURF.sphere = {
        key:'sphere',
        meshes,
        oldMats:_captureOldMaterials(meshes),
        applied:false,
        canvas:c,ctx,tex,
        mat:(function(){
          const m=new THREE.MeshBasicMaterial({ map:tex,color:0xffffff,side:THREE.BackSide,fog:false,depthWrite:false });
          m.toneMapped=false;
          return m;
        })(),
        input:null,img:makeHiddenImg(),video:makeHiddenVideo(),
        kind:'none',url:null,gifAnim:null,gifActive:false,videoActive:false,
        lastUpd:0
      };
    })();

    // Shared file inputs (one per surface) so mobile file pick works reliably.
    for(const key of Object.keys(SURF)){
      const inp=document.createElement('input');
      inp.type='file';
      inp.setAttribute('data-media-skin-input','1');
      inp.setAttribute('aria-hidden','true');
      inp.tabIndex=-1;
      inp.accept='image/*,video/mp4,video/webm,video/*';
      inp.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0;';
      document.body.appendChild(inp);
      SURF[key].input=inp;

      inp.addEventListener('change', ()=>{
        const f = inp.files && inp.files[0];
        // reset input so selecting the same file twice still triggers change
        inp.value='';
        if(!f) return;
        try{ __mediaPicking=false; uiBlock(900); }catch(e){}
        loadFileToSurface(key, f);
      }, {passive:true});
    }
  }

  function init(){
    if(inited) return;
    inited=true;
    _initSurfaces();
  }

  function pick(key){
    const s=SURF[key];
    if(!s || !s.input) return;

    // Mobile file picker can emit ghost clicks / focus events.
    // Mark as picking and block game input until the picker returns.
    try{ __mediaPicking=true; }catch(e){}
    try{ if(typeof uiBlock==='function') uiBlock(2200); }catch(e){}

    try{ s.input.click(); }catch(e){}
  }

  function clear(key){
    _clearSurface(key);
  }

  function loadFileToSurface(key, file){
    const s=SURF[key];
    if(!s) return;

    // Stop prior media and free previous URL
    _stopGif(s);
    _stopVideo(s);
    _disposeUrl(s.url);

    s.url = URL.createObjectURL(file);
    const type=(file.type||'').toLowerCase();
    const name=(file.name||'').toLowerCase();
    const isVid = type.startsWith('video/');
    const isGif = (type==='image/gif') || name.endsWith('.gif');

    // IMPORTANT: apply our material only once user chooses media
    _applyMaterial(s);

    if(isVid){
      s.kind='video';
      s.videoActive=true;

      const v=s.video;
      v.src=s.url;

      // Kick playback; some browsers require the file selection gesture (which we have).
      const tryPlay=()=>{
        try{
          const p=v.play();
          if(p && typeof p.catch==='function') p.catch(()=>{});
        }catch(e){}
      };

      v.onloadeddata=()=>{
        _drawCover(s.ctx, v);
        s.tex.needsUpdate=true;
        tryPlay();
      };
      v.oncanplay=tryPlay;
      v.onerror=()=>{ /* keep last frame */ };
      try{ v.load(); }catch(e){}
      tryPlay();
      return;
    }

    // GIF (animated) — try gifler; fall back to static image if not available.
    if(isGif){
      s.kind='gif';

      const startImage=()=>{
        s.kind='image';
        const img=s.img;
        img.onload=()=>{
          _drawCover(s.ctx, img);
          s.tex.needsUpdate=true;
        };
        img.onerror=()=>{};
        img.src=s.url;
      };

      const startGif=()=>{
        if(typeof window.gifler !== 'function'){
          startImage();
          return;
        }
        s.gifActive=true;
        try{
          s.gifAnim = window.gifler(s.url);
          // gifler animates directly into our canvas
          s.gifAnim.animate(s.canvas);
          s.tex.needsUpdate=true;
        }catch(e){
          startImage();
        }
      };

      if(window.__cybrk_gifler_ready && typeof window.__cybrk_gifler_ready.then==='function'){
        window.__cybrk_gifler_ready.then((ok)=>{ if(ok) startGif(); else startImage(); });
      } else {
        startGif();
      }
      return;
    }

    // Static image
    s.kind='image';
    const img=s.img;
    img.onload=()=>{
      _drawCover(s.ctx, img);
      s.tex.needsUpdate=true;
    };
    img.onerror=()=>{};
    img.src=s.url;
  }

  // Update video/gif textures (throttled to ~30 fps per surface)
  function tick(ts){
    const now = performance.now();
    for(const key of Object.keys(SURF)){
      const s=SURF[key];
      if(!s || !s.applied) continue;

      // Video frame pull
      if(s.videoActive && s.video && s.video.readyState>=2){
        if(now - s.lastUpd >= 33){
          s.lastUpd = now;
          _drawCover(s.ctx, s.video);
          s.tex.needsUpdate=true;
        }
      }

      // GIF: mark texture updated (gifler draws to canvas itself)
      if(s.gifActive){
        if(now - s.lastUpd >= 33){
          s.lastUpd = now;
          s.tex.needsUpdate=true;
        }
      }
    }
  }

  return { init, pick, clear, tick };
})();

function buildBrickPool(){

  for(let i=0;i<POOL_SIZE;i++){
    const mat=new THREE.MeshStandardMaterial({
      color:0x00f7ff,emissive:0x00f7ff,emissiveIntensity:.65,metalness:.3,roughness:.45});
    const m=new THREE.Mesh(geo,mat);
    const el=new THREE.LineSegments(edgeGeo.clone(),
      new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.35}));
    m.add(el);m.visible=false;scene.add(m);brickPool.push(m);
  }
}

function buildBricks3D(){
  brickPool.forEach(m=>{m.visible=false;});
  let idx=0;
  for(const b of bricks){
    if(idx>=POOL_SIZE)break;
    const m=brickPool[idx++];
    const cf=BC[b.type];
    m.material.color.setHex(cf.hex);m.material.emissive.setHex(cf.hex);
    m.material.emissiveIntensity=b.type===4?.12:b.type===7?1.3:.65;
    m.material.metalness=b.type===4?.75:.28;

    m.rotation.set(0,0,0);m.scale.set(1,1,1);m.visible=true;b.mesh=m;
  }
}
