// ═════════════════════════════════════════════════════════════════════════════
// 3D SYNC — every frame
// ═════════════════════════════════════════════════════════════════════════════
let camSX=0,camSY=0;

function sync3D(){
  const t=timeE;
  const p1=.5+.5*Math.sin(t*2.2);
  const p2=.5+.5*Math.sin(t*1.7+.9);

  // ⚡ EPIC: Update shockwaves, lightning, ambient music
  if(state!=='paused'){
    const __dt3 = (_lastDT||1);
    updateShockwaves(__dt3);
    updateLightning();
    tickAmbientMusic(__dt3);
  }

  // ── Skybox follows camera — TRUE panoramic ───────────────
  // The sphere is always centered on the camera, so you're
  // always inside it. As you orbit, the sphere's world-space
  // orientation stays fixed, creating true parallax.
  skyboxMesh.position.copy(camera.position);
  // Very slow independent drift for atmosphere
  if(state!=='paused'){
    skyboxMesh.rotation.y+=0.000055;
    skyboxMesh.rotation.x+=0.000018;
  }

  // ── Auto-orbit in menu/end screens ───────────────────────
  if(['menu','levelComplete','gameOver','victory'].includes(state)&&orbitPauseTimer<=0){
    camTheta+=0.0018;
  }

  // ── Camera orbit & ball tracking ─────────────────────────
  if(orbitPauseTimer>0)orbitPauseTimer--;

  const inGame=state==='playing'||state==='launch'||state==='paused';
  if(inGame && camMode==='cockpit'){
    // Dynamically adjust FOV for immersion
    const targetFOV=AP.fast>0?88:AP.slow>0?68:78;
    cockpitFOV+=(targetFOV-cockpitFOV)*0.06;
    camera.fov=cockpitFOV;
    camera.updateProjectionMatrix();
    updateCockpitCamera();

    // Speed lines when FAST active
    const sl=$id('speedLines');
    if(AP.fast>0){
      if(!sl.classList.contains('active')){
        sl.classList.add('active');
        // Generate radial speed lines via inline SVG
        let svg='<svg style="position:absolute;inset:0;width:100%;height:100%" xmlns="http://www.w3.org/2000/svg">';
        const cx=50,cy=50;
        for(let i=0;i<32;i++){
          const a=(i/32)*360;
          const rad=a*Math.PI/180;
          const x1=cx+Math.cos(rad)*8,y1=cy+Math.sin(rad)*8;
          const x2=cx+Math.cos(rad)*62,y2=cy+Math.sin(rad)*62;
          svg+=`<line x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%" stroke="rgba(255,80,30,0.18)" stroke-width="1.5"/>`;
        }
        svg+='</svg>';
        sl.innerHTML=svg;
      }
    } else { sl.classList.remove('active'); sl.innerHTML=''; }

    // Danger flash
    if(dangerPulse>0.5){
      const df=$id('dangerFlash');
      df.style.background=`rgba(255,30,60,${dangerPulse*0.12})`;
    } else {
      $id('dangerFlash').style.background='rgba(255,30,60,0)';
    }
  } else if(inGame && camMode==='ball'){
    // Ball POV FOV: slightly wider for speed sensation
    const targetFOV=AP.fast>0?100:AP.slow>0?78:90;
    ballFOV+=(targetFOV-ballFOV)*0.06;
    camera.fov=ballFOV;
    camera.updateProjectionMatrix();
    updateBallCamera();

// Speed lines when FAST active
    const sl=$id('speedLines');
    if(AP.fast>0){
      if(!sl.classList.contains('active')){
        sl.classList.add('active');
        // Generate radial speed lines via inline SVG
        let svg='<svg style="position:absolute;inset:0;width:100%;height:100%" xmlns="http://www.w3.org/2000/svg">';
        const cx=50,cy=50;
        for(let i=0;i<32;i++){
          const a=(i/32)*360;
          const rad=a*Math.PI/180;
          const x1=cx+Math.cos(rad)*8,y1=cy+Math.sin(rad)*8;
          const x2=cx+Math.cos(rad)*62,y2=cy+Math.sin(rad)*62;
          svg+=`<line x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%" stroke="rgba(255,80,30,0.18)" stroke-width="1.5"/>`;
        }
        svg+='</svg>';
        sl.innerHTML=svg;
      }
    } else { sl.classList.remove('active'); sl.innerHTML=''; }

    // Danger flash
    if(dangerPulse>0.5){
      const df=$id('dangerFlash');
      df.style.background=`rgba(255,30,60,${dangerPulse*0.12})`;
    } else {
      $id('dangerFlash').style.background='rgba(255,30,60,0)';
    }

  } else {
    $id('speedLines').classList.remove('active');
    $id('speedLines').innerHTML='';
    // Restore orbit FOV
    camera.fov=65; camera.updateProjectionMatrix();
    const aBall=balls.find(b=>b.active);
    const tfx=aBall?g3x(aBall.x)*.04:0;
    const tfy=aBall?g3y(aBall.y)*.025:0;
    camSX+=(tfx-camSX)*.04;camSY+=(tfy-camSY)*.03;
    CAM_TARGET.x=camSX;CAM_TARGET.y=20+camSY;
    updateCamera();
    if(shakeAmt>.1){camera.position.x+=shakeX*.4;camera.position.y+=shakeY*.4;}
  }

  // ── Corner lights ──────────────────────────────────────────
  cornerLights[0].intensity=.85+.7*p1;
  cornerLights[1].intensity=.85+.7*p2;
  const dp=dangerPulse*1.8;
  cornerLights[2].intensity=.55+.45*p2+dp;
  cornerLights[3].intensity=.55+.45*p1+dp;
  if(dangerPulse>.1){cornerLights[2].color.setHex(0xff4d6d);cornerLights[3].color.setHex(0xff4d6d);}
  else{cornerLights[2].color.setHex(0x00f7ff);cornerLights[3].color.setHex(0xff4d6d);}

  // ── Bricks ─────────────────────────────────────────────────
  for(const b of bricks){
    if(!b.mesh)continue;
    b.hitT=Math.max(0,b.hitT-1);
    if(b.hitT>0){
      b.mesh.material.color.setRGB(1,1,1);
      b.mesh.material.emissive.setRGB(1,1,1);
      b.mesh.material.emissiveIntensity=2.8+Math.sin(b.hitT*.9)*1.5;
      const hs=1+b.hitT*.025;b.mesh.scale.set(hs,hs,hs);
    } else {
      b.mesh.material.color.setHex(b.hex);b.mesh.material.emissive.setHex(b.hex);
      const ratio=b.maxHp>1?b.hp/b.maxHp:1;
      if(b.type===7){b.mesh.material.emissiveIntensity=.9+.9*p1;
        b.mesh.scale.set(1+.015*Math.sin(t*3.1),1+.015*Math.sin(t*2.4),1);}
      else if(b.type===4){b.mesh.material.emissiveIntensity=.12;b.mesh.scale.set(1,1,1);}
      else{b.mesh.material.emissiveIntensity=(.55+.2*p1)*ratio;b.mesh.scale.set(1,1,1);}
    }
  }

  // ── Ball ───────────────────────────────────────────────────
  let bc=0x00f7ff;
  if(AP.ghost>0)bc=0xb14cff;else if(AP.slow>0)bc=0x4aa8ff;else if(AP.fast>0)bc=0xff4d6d;
  ballMesh.material.color.setHex(bc);ballMesh.material.emissive.setHex(bc);
  ballMesh.material.emissiveIntensity=2.4+1.2*p1;
  ballGlow.material.color.setHex(bc);ballGlow.material.opacity=.07+.07*p1;
  ballLightA.color.setHex(bc);ballLightB.color.setHex(bc);
  ballLightA.intensity=6.0+2.8*p1;ballLightB.intensity=2.5+1.2*p2;
  if(state==='launch'){
    ballMesh.visible=true;
    const bx=g3x(paddle.x+paddle.w/2),by=g3y(paddle.y-BALL_R-2);
    ballMesh.position.set(bx,by,0);ballLightA.position.set(bx,by,20);ballLightB.position.set(bx,by+25,45);
  } else if(balls.length>0&&balls[0].active){
    const b0=balls[0];const bx=g3x(b0.x),by=g3y(b0.y);
    ballMesh.visible=true;ballMesh.position.set(bx,by,0);
    ballLightA.position.set(bx,by,25);ballLightB.position.set(bx,by+18,50);
  } else {ballMesh.visible=false;ballLightA.intensity=0;ballLightB.intensity=0;}
  // Hide the visible ball model in BALL POV (camera is riding it)
  if(camMode==='ball' && (state==='playing'||state==='launch')){ ballMesh.visible=false; }


  // ── Trajectory preview (cockpit mode only, ball coming toward paddle) ──────
  const showTraj=(camMode==='cockpit'||camMode==='ball')&&(state==='playing'||state==='launch');
  if(showTraj&&balls.length>0&&balls[0].active&&(camMode==='ball'||balls[0].vy>0)){
    const pred=getBallPrediction(balls[0]);
    const tpts=pred.pts;
    const posArr=trajLineGeo.attributes.position.array;
    const n=Math.min(tpts.length,240);
    for(let i=0;i<n;i++){
      posArr[i*3]=g3x(tpts[i].x);
      posArr[i*3+1]=g3y(tpts[i].y);
      posArr[i*3+2]=2;
    }
    trajLineGeo.setDrawRange(0,n);
    trajLineGeo.attributes.position.needsUpdate=true;
    // Fade opacity based on time
    trajLineMat.opacity=(camMode==='ball'?0.52:0.28)+(camMode==='ball'?0.10:0.18)*Math.sin(timeE*6);
    trajLine.visible=n>2;
  } else {
    trajLine.visible=false;
  }

  // ── Trail ──────────────────────────────────────────────────
  let ti=0;
  for(const ball of balls){
    if(!ball.active)continue;

    const tn=ball.trailN|0;
    if(tn<=0)continue;
    const start=(ball.trailI - tn + TRAIL_LEN) % TRAIL_LEN;

    for(let j=0;j<tn && ti<trailMeshes.length;j++,ti++){
      const idx=(start + j) % TRAIL_LEN;
      const tm=trailMeshes[ti];
      const frac = (tn>1) ? (j/(tn-1)) : 1;

      tm.visible=true;
      tm.position.set(g3x(ball.trailX[idx]),g3y(ball.trailY[idx]),0);
      tm.material.color.setHex(bc);
      tm.material.opacity=frac*0.42;

      const sc=frac*0.72;
      tm.scale.set(sc,sc,sc);
    }
  }
  for(;ti<trailMeshes.length;ti++)trailMeshes[ti].visible=false;

  // ── Paddle ─────────────────────────────────────────────────
  let pc=0x00f7ff;
  if(AP.wide>0)pc=0x3dff8a;else if(AP.narrow>0)pc=0xff4d6d;
  else if(AP.laser>0)pc=0xb14cff;else if(AP.magnet>0)pc=0x4aa8ff;
  else if(lives===1)pc=0xff4d6d;
  paddleMesh.material.color.setHex(pc);paddleMesh.material.emissive.setHex(pc);
  paddleMesh.material.emissiveIntensity=.75+.4*p1;
  paddleMesh.scale.set(paddle.w/100,1,1);
  const px=g3x(paddle.x+paddle.w/2),py=g3y(paddle.y+PAD_H/2);
  paddleMesh.position.set(px,py,0);
  paddleLight.color.setHex(pc);paddleLight.position.set(px,py+20,30);
  paddleLight.intensity=2.5+1.0*p1;

  // ⚡ EPIC: Energy field around paddle when powered up
  if(energyFieldMesh){
    const powered=AP.wide>0||AP.narrow>0||AP.laser>0||AP.magnet>0||AP.fast>0||AP.ghost>0;
    energyFieldMesh.visible=powered;
    if(powered){
      energyFieldMesh.position.set(px,py,0);
      energyFieldMesh.scale.x=paddle.w/102;
      energyFieldMesh.material.color.setHex(pc);
      energyFieldMesh.material.opacity=0.12+0.08*p1;
      energyFieldMesh.rotation.z=t*1.5;
    }
  }

  // ── Landing zone marker ─────────────────────────────────────
  const lm=window._landingMarker;
  if(lm){
    const showLM=camMode==='cockpit'&&balls.length>0&&balls[0].active&&balls[0].vy>0;
    if(showLM){
      const pred=getBallPrediction(balls[0]);
      const lx=(pred.landX!=null)?pred.landX:(pred.pts.length?pred.pts[pred.pts.length-1].x:null);
      if(lx!=null){
        lm.position.set(g3x(lx),g3y(paddle.y+PAD_H/2),1);
        lm.material.opacity=0.3+0.2*Math.sin(timeE*8);
        lm.visible=true;
      } else { lm.visible=false; }
    } else { lm.visible=false; }
  }
  const fpw=poolPow.filter(m=>!m._use);
  for(const pw of pows){
    if(!pw.mesh&&fpw.length>0){
      pw.mesh=fpw.pop();pw.mesh._use=true;pw.mesh.visible=true;
      pw.mesh.material.color.setHex(pw.hex);pw.mesh.material.emissive.setHex(pw.hex);}
    if(pw.mesh){
      pw.mesh.visible=true;
      pw.mesh.position.set(g3x(pw.x+pw.w/2),g3y(pw.y+pw.h/2),0);
      pw.mesh.rotation.y=t*2.5;pw.mesh.rotation.x=t*1.8;
      pw.mesh.material.emissiveIntensity=.75+.4*p1;}
  }

  // ── Lasers ─────────────────────────────────────────────────
  const fls=poolLas.filter(m=>!m._use);
  for(const ls of lasers){
    if(!ls.mesh&&fls.length>0){ls.mesh=fls.pop();ls.mesh._use=true;ls.mesh.visible=true;}
    if(ls.mesh){ls.mesh.visible=true;ls.mesh.position.set(g3x(ls.x+ls.w/2),g3y(ls.y+ls.h/2),0);}
  }

  // ── Shield ─────────────────────────────────────────────────
  if(AP.shield){shieldMesh.visible=true;shieldMesh.material.opacity=.28+.17*p1;}
  else shieldMesh.visible=false;

  // ── Particles → GPU buffer ─────────────────────────────────
  const pc3=Math.min(parts.length,MAX_PARTS);
  for(let i=0;i<MAX_PARTS;i++){
    if(i<pc3){
      const p=parts[i];
      pPos[i*3]=g3x(p.x);pPos[i*3+1]=g3y(p.y);pPos[i*3+2]=p.z||0;
      const life=Math.max(0,p.life),rgb=h2rgb(p.col);
      pCol[i*3]=rgb.r;pCol[i*3+1]=rgb.g;pCol[i*3+2]=rgb.b;
      pSz[i]=p.sz*life*4.5;
    } else {pPos[i*3]=0;pPos[i*3+1]=-9999;pPos[i*3+2]=0;pSz[i]=0;}
  }
  pGeo.attributes.position.needsUpdate=true;
  pGeo.attributes.color.needsUpdate=true;
  pGeo.attributes.size.needsUpdate=true;
}

let hudCanvas,hctx;
function setupHud(){
  hudCanvas=$id('hud');
  hctx=hudCanvas.getContext('2d');
  resizeHud();
}
function resizeHud(){
  calcHud();
  const dpr=window.devicePixelRatio||1;
  hudCanvas.width=Math.round(window.innerWidth*dpr);
  hudCanvas.height=Math.round(window.innerHeight*dpr);
  hudCanvas.style.width=window.innerWidth+'px';
  hudCanvas.style.height=window.innerHeight+'px';
}
function h2rgba(h,a){
  const v=parseInt(h.replace('#',''),16);
  return`rgba(${(v>>16)&255},${(v>>8)&255},${v&255},${a})`;
}

function renderHUD(){
  const dpr=window.devicePixelRatio||1;
  hctx.save();hctx.scale(dpr,dpr);
  hctx.clearRect(0,0,window.innerWidth,window.innerHeight);
  if(state==='menu'){drawMenuHUD();hctx.restore();return;}
  hctx.translate(hudOX,hudOY);hctx.scale(hudScale,hudScale);
  drawGameHUD();
  if(state==='launch')drawLaunchHUD();
  if(state==='paused')drawPause();
  if(state==='levelComplete')drawLvComplete();
  if(state==='gameOver')drawGameOver();
  if(state==='victory')drawVictory();
  hctx.restore();
}

function drawGameHUD(){
  // Epic header bar
  const hdrGrad=hctx.createLinearGradient(0,0,0,52);
  hdrGrad.addColorStop(0,'rgba(0,8,22,0.9)');
  hdrGrad.addColorStop(1,'rgba(0,2,8,0.65)');
  hctx.fillStyle=hdrGrad;hctx.fillRect(0,0,GW,52);

  // Animated header border line
  const borderGrad=hctx.createLinearGradient(0,0,GW,0);

function drawCockpitTrack(){
  const trackY=GH-14;   // bottom strip
  const trackH=10;
  const trackX=12;
  const trackW=GW-24;
  const t=fc*.018;

  // Rail background
  hctx.save();
  hctx.globalAlpha=0.55;
  hctx.fillStyle='rgba(0,10,22,0.85)';
  hctx.beginPath();hctx.roundRect(trackX,trackY,trackW,trackH,5);hctx.fill();

  // Rail glow line
  const railGrad=hctx.createLinearGradient(trackX,0,trackX+trackW,0);
  railGrad.addColorStop(0,'rgba(0,247,255,0.08)');
  railGrad.addColorStop(0.5,'rgba(0,247,255,0.28)');
  railGrad.addColorStop(1,'rgba(0,247,255,0.08)');
  hctx.fillStyle=railGrad;
  hctx.beginPath();hctx.roundRect(trackX,trackY,trackW,trackH,5);hctx.fill();

  // Tick marks every 10%
  hctx.globalAlpha=0.25;
  for(let i=1;i<10;i++){
    const tx=trackX+trackW*(i/10);
    hctx.strokeStyle='rgba(0,247,255,0.6)';hctx.lineWidth=1;
    hctx.beginPath();hctx.moveTo(tx,trackY+2);hctx.lineTo(tx,trackY+trackH-2);hctx.stroke();
  }
  hctx.globalAlpha=1;

  // Paddle block on track
  const padPct=paddle.x/(GW-paddle.w);
  const padWidthPct=paddle.w/GW;
  const blockX=trackX+padPct*trackW*(1-padWidthPct);
  const blockW=trackW*padWidthPct;

  // Paddle color matches powerup
  let padCol='#00f7ff';
  if(AP.wide>0)padCol='#3dff8a';
  else if(AP.narrow>0)padCol='#ff4d6d';
  else if(AP.laser>0)padCol='#b14cff';
  else if(AP.magnet>0)padCol='#4aa8ff';
  else if(lives===1)padCol='#ff4d6d';

  const pulse=0.7+0.3*Math.sin(t*3.5);
  hctx.shadowColor=padCol;hctx.shadowBlur=12*pulse;
  const padGrad=hctx.createLinearGradient(blockX,trackY,blockX,trackY+trackH);
  padGrad.addColorStop(0,padCol);
  padGrad.addColorStop(1,padCol.replace('ff','88').replace('FF','88'));
  hctx.fillStyle=padGrad;
  hctx.beginPath();hctx.roundRect(blockX,trackY,blockW,trackH,4);hctx.fill();

  // Bright center line on paddle block
  hctx.globalAlpha=0.7*pulse;
  hctx.strokeStyle='#fff';hctx.lineWidth=1.5;hctx.shadowBlur=4;
  hctx.beginPath();
  hctx.moveTo(blockX+2,trackY+trackH/2);
  hctx.lineTo(blockX+blockW-2,trackY+trackH/2);
  hctx.stroke();

  // Ball landing position dot on track (when ball coming down)
  if(balls.length>0&&balls[0].active&&(camMode==='ball'||balls[0].vy>0)){
    const pred=getBallPrediction(balls[0]);
    const tpts=pred.pts;
    if(tpts.length>0){
      const landX=(pred.landX!=null)?pred.landX:tpts[tpts.length-1].x;
      const dotX=trackX+(landX/GW)*trackW;
      const dotPulse=0.6+0.4*Math.sin(t*7);
      hctx.globalAlpha=dotPulse;
      hctx.shadowColor='#ffff00';hctx.shadowBlur=8;
      hctx.fillStyle='#ffff00';
      hctx.beginPath();hctx.arc(dotX,trackY+trackH/2,3.5,0,Math.PI*2);hctx.fill();
    }
  }

  // Left/right arena edge labels
  hctx.globalAlpha=0.35;hctx.shadowBlur=0;
  hctx.font='bold 7px Orbitron,sans-serif';hctx.fillStyle='rgba(0,247,255,0.6)';
  hctx.textAlign='left';hctx.textBaseline='bottom';
  hctx.fillText('◄',trackX-1,trackY);
  hctx.textAlign='right';
  hctx.fillText('►',trackX+trackW+1,trackY);
  hctx.restore();
}
function drawAPBars(){

  if(AP.narrow>0)act.push({l:'NARROW',c:'#ff4d6d',t:AP.narrow,m:PDR.narrow});
  if(AP.laser>0)act.push({l:'LASER',c:'#b14cff',t:AP.laser,m:PDR.laser});

    hctx.beginPath();hctx.arc(GW/2+dx2,GH/2+dy2-20,4,0,Math.PI*2);hctx.fill();
    hctx.restore();
  }

  // VICTORY! text with epic multi-layer glow
  const pp=0.5+0.5*Math.sin(fc*.1);
  hctx.textAlign='center';

  // Glow halos
  hctx.shadowColor='#3dff8a';hctx.shadowBlur=100+pp*40;
  hctx.font='900 68px Orbitron,sans-serif';
  hctx.fillStyle='rgba(61,255,138,0.1)';
  hctx.fillText('VICTORY!',GW/2,GH/2-50);

  // Main text gradient
  const vtGrad=hctx.createLinearGradient(0,GH/2-100,0,GH/2-50);
  vtGrad.addColorStop(0,'#ffffff');vtGrad.addColorStop(0.4,'#3dff8a');vtGrad.addColorStop(1,'rgba(61,255,138,0.8)');
  hctx.shadowColor='#3dff8a';hctx.shadowBlur=55+pp*25;
  hctx.fillStyle=vtGrad;hctx.fillText('VICTORY!',GW/2,GH/2-50);

  hctx.shadowColor='#ffb020';hctx.shadowBlur=14;
  hctx.font='bold 18px Orbitron,sans-serif';hctx.fillStyle='#ffb020';
  hctx.fillText('ALL 9 LEVELS DEFEATED!',GW/2,GH/2+4);

  hctx.shadowBlur=6;hctx.font='bold 15px Orbitron,sans-serif';hctx.fillStyle='#fff';
  hctx.fillText('FINAL SCORE:  '+score.toLocaleString(),GW/2,GH/2+36);

  if(score===hi&&hi>0){
    hctx.fillStyle='#ffb020';hctx.shadowColor='#ffb020';hctx.shadowBlur=18;
    hctx.font='bold 17px Orbitron,sans-serif';
    hctx.fillText('★  NEW HI-SCORE!  ★',GW/2,GH/2+62);
  }

  const bw=245,bh=56,bx=GW/2-122,by=GH/2+86;
  const bg2=hctx.createLinearGradient(bx,by,bx,by+bh);
  bg2.addColorStop(0,'rgba(61,255,138,0.28)');bg2.addColorStop(1,'rgba(61,255,138,0.10)');
  hctx.shadowColor='#3dff8a';hctx.shadowBlur=18+pp*14;
  hctx.beginPath();hctx.roundRect(bx,by,bw,bh,14);hctx.fillStyle=bg2;hctx.fill();
  hctx.strokeStyle='rgba(61,255,138,'+(0.6+pp*.4)+')';hctx.lineWidth=1.8;hctx.stroke();
  hctx.font='bold 18px Orbitron,sans-serif';hctx.fillStyle='#fff';hctx.textBaseline='middle';
  hctx.shadowColor='#3dff8a';hctx.shadowBlur=12;
  hctx.fillText('⚡  PLAY AGAIN',GW/2,by+bh/2);hctx.restore();
}

// ── Unified click/tap handler ─────────────────────────────────────────────────
function handleClick(cx,cy){
  if(typeof uiIsBlocking==='function' && uiIsBlocking()) return;
  getAC();
  if(state==='menu'){if(cy>GH/2+82&&cy<GH/2+144&&cx>GW/2-127&&cx<GW/2+127)startGame();return;}
  if(state==='gameOver'||state==='victory'){if(cy>GH/2+112&&cy<GH/2+166)startGame();return;}
  if(state==='paused'){return;}
  if(state==='launch'){launchBall();return;}
  if(state==='playing'&&AP.magnet>0){releaseCaught();return;}
}

// ─────────────────────────────────────────────────────────────
// UI / FILE-PICKER CLICK-GUARD (prevents accidental launch/resume)
// ─────────────────────────────────────────────────────────────
let __uiBlockUntil = 0;      // ms timestamp (Date.now)
let __mediaPanelOpen = false;
let __mediaPicking = false;

function uiBlock(ms){
  const add = (ms||0);
  const t = Date.now() + add;
  if(t > __uiBlockUntil) __uiBlockUntil = t;
}
function uiIsBlocking(){
  return !!__mediaPanelOpen || !!__mediaPicking || (Date.now() < __uiBlockUntil);
}

// When returning from Android file picker, browsers often emit a "ghost" click.
// Block inputs for a moment whenever page regains focus/visibility.
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden){
    uiBlock(650);
    __mediaPicking = false;
  }
}, false);
window.addEventListener('focus', ()=>{
  uiBlock(650);
  __mediaPicking = false;
}, false);

function isUIEvent(e){
  try{
    const t = e && e.target;
    if(!t) return false;

    // Anything inside our UI chrome is a UI event.
    if(typeof t.closest==='function'){
      if(t.closest('#mediaPanel,#mediaBtn,#pauseBtn,#viewToggleBtn')) return true;
    }

    // Hidden media file inputs are UI, too (they can trigger ghost clicks on mobile).
    if(t.matches && t.matches('input[type="file"][data-media-skin-input="1"]')) return true;

    return false;
  }catch(err){ return false; }
}

function onMD(e){
  if(uiIsBlocking()) return;
  if(isUIEvent(e)) return;
  if(e.button===2){
    rightDragActive=true;rightDragLX=e.clientX;rightDragLY=e.clientY;
    e.preventDefault();return;
  }
  dragActive=true;dragMoved=false;
  dragStartX=dragLX=e.clientX;dragStartY=dragLY=e.clientY;
}
function onMM(e){
  if(rightDragActive){
    const dx=e.clientX-rightDragLX,dy=e.clientY-rightDragLY;
    if(camMode!=='orbit'){
      cockpitLookOffX+=dx*1.1;
      cockpitLookOffY+=dy*0.7;
      cockpitLookOffX=Math.max(-320,Math.min(320,cockpitLookOffX));
      cockpitLookOffY=Math.max(-180,Math.min(180,cockpitLookOffY));
    } else {
      camTheta-=dx*.005;camPhi-=dy*.003;orbitPauseTimer=300;
    }
    rightDragLX=e.clientX;rightDragLY=e.clientY;
  }
  if(dragActive){
    const dx=e.clientX-dragLX,dy=e.clientY-dragLY;
    if(camMode==='orbit'){
      // Only count drag in orbit mode — cockpit left-drag just moves paddle, not a "drag" for click purposes
      if(Math.hypot(e.clientX-dragStartX,e.clientY-dragStartY)>7)dragMoved=true;
      if(dragMoved){camTheta-=dx*.005;camPhi-=dy*.003;orbitPauseTimer=300;}
    }
    dragLX=e.clientX;dragLY=e.clientY;
  }
  const g=c2g(e.clientX,e.clientY);
  mouseX=Math.max(0,Math.min(GW,g.x));
}
function onMU(e){
  if(e.button===2){rightDragActive=false;return;}
  dragActive=false;
  dragMoved=false; // FIX: always reset so next click is never blocked
}
function onCK(e){
  if(uiIsBlocking()) return;
  if(isUIEvent(e)) return;
  // Suppress synthetic click fired by browser after touchend (300-500ms ghost click)
  if(Date.now()-lastTouchEndTime<600)return;
  if(dragMoved)return;
  const g=c2g(e.clientX,e.clientY);handleClick(g.x,g.y);
}
function onWheel(e){
  if(uiIsBlocking()) return;
  if(isUIEvent(e)) return;
  camR+=e.deltaY*.8;camR=Math.max(500,Math.min(2200,camR));orbitPauseTimer=120;
}
function toggleCamMode(){
  // Cycle: cockpit → ball POV → orbit → cockpit
  camMode = (camMode==='cockpit') ? 'ball' : (camMode==='ball') ? 'orbit' : 'cockpit';

  const hint=$id('hint');
  const dash=$id('cockpitDash');
  const cross=$id('crosshair');
  const ring1=$id('crosshairRing1');
  const ring2=$id('crosshairRing2');
  const vig=$id('vignette');
  const chrome=$id('chromeEdge');
  const btn=$id('viewToggleBtn');

  // SAFE helpers — prevents: "Cannot read properties of null (reading 'classList')"
  const setActive=(el,on)=>{ if(el) el.classList[on?'add':'remove']('active'); };
  const setHTML=(el,html)=>{ if(el) el.innerHTML=html; };
  const setText=(el,txt)=>{ if(el) el.textContent=txt; };
  const setFOV=(fov)=>{
    if(typeof camera!=='undefined' && camera && typeof camera.updateProjectionMatrix==='function'){
      camera.fov=fov; camera.updateProjectionMatrix();
    }
  };

  if(camMode==='orbit'){
    setHTML(hint,'🌐 ORBIT — DRAG · ORBIT &nbsp;|&nbsp; SCROLL · ZOOM<br>2-FINGER · ORBIT &nbsp;|&nbsp; V · CHANGE VIEW');
    setActive(dash,false);
    setActive(cross,false);
    setActive(ring1,false);
    setActive(ring2,false);
    setActive(vig,false);
    setActive(chrome,false);
    setText(btn,'🌐 ORBIT VIEW');
    camTheta=0.30;camPhi=0.42;
    setFOV(65);
  } else if(camMode==='ball'){
    setHTML(hint,'🎯 BALL POV — YOU ARE THE BALL<br>SLIDE/MOUSE · PADDLE &nbsp;|&nbsp; RIGHT-DRAG/2-FINGER · LOOK &nbsp;|&nbsp; V · CHANGE VIEW');
    setActive(dash,true);
    setActive(cross,true);
    setActive(ring1,true);
    setActive(ring2,true);
    setActive(vig,true);
    setActive(chrome,true);
    setText(btn,'🎯 BALL POV');

    // Initialize ball cam smoothing state so it snaps instantly on switch
    const b = balls.find(bb=>bb.active) || (state==='launch' ? {x:paddle.x+paddle.w/2,y:paddle.y-BALL_R-2,vx:0,vy:-1} : null);
    if(b){
      ballCamX=g3x(b.x); ballCamY=g3y(b.y);
      // Look forward
      let vxw=b.vx, vyw=-b.vy; let vl=Math.hypot(vxw,vyw); if(vl<0.0001){vxw=0;vyw=1;vl=1;}
      vxw/=vl; vyw/=vl;
      ballLookX=ballCamX+vxw*155; ballLookY=ballCamY+vyw*155;
    }
    cockpitLookOffX=0;cockpitLookOffY=0;
    camLean=0;camLeanVel=0;
  } else { // cockpit
    setHTML(hint,'⚡ COCKPIT — SLIDE/MOUSE · PADDLE &nbsp;|&nbsp; RIGHT-DRAG/2-FINGER · LOOK<br>A/D OR ←/→ · MOVE &nbsp;|&nbsp; V · CHANGE VIEW');
    setActive(dash,true);
    setActive(cross,true);
    setActive(ring1,true);
    setActive(ring2,true);
    setActive(vig,true);
    setActive(chrome,true);
    setText(btn,'⚡ COCKPIT VIEW');
    cockpitCamX=g3x(paddle.x+paddle.w/2);
    cockpitCamY=g3y(paddle.y+PAD_H/2)+40;
    cockpitLookX=0;cockpitLookY=80;
    camLean=0;camLeanVel=0;
    cockpitLookOffX=0;cockpitLookOffY=0;
  }
}


// ─────────────────────────────────────────────────────────────
// ⏸️ PAUSE (RIGHT SIDE) — freezes gameplay + audio
// - Preserves prior state (playing/launch/menu/etc.)
// - Prevents time/physics from advancing while paused
// ─────────────────────────────────────────────────────────────
let pausePrevState='playing';
let __pauseBtnLast=null;

function _updatePauseBtn(){
  const b=$id('pauseBtn');
  if(!b) return;
  const isPaused = (state==='paused');
  b.classList.toggle('on', isPaused);
  b.setAttribute('aria-pressed', isPaused ? 'true' : 'false');
  b.textContent = isPaused ? '▶ RESUME' : '⏸ PAUSE';
}

function _syncPauseBtn(){
  const p=(state==='paused');
  if(p===__pauseBtnLast) return;
  __pauseBtnLast=p;
  _updatePauseBtn();
}

function resumeFromPause(){
  if(state!=='paused') return;
  state = (pausePrevState && pausePrevState!=='paused') ? pausePrevState : 'playing';
  try{ if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }catch(e){}
  _updatePauseBtn();
}

function setPaused(on){
  const want = !!on;
  if(want){
    if(state==='paused') return;
    pausePrevState = state;
    state='paused';
    // Freeze audio if running (safe on mobile; resume is a user gesture)
    try{ if(audioCtx && audioCtx.state==='running') audioCtx.suspend(); }catch(e){}
  } else {
    resumeFromPause();
  }
  _updatePauseBtn();
}

function togglePause(){
  if(state==='paused') setPaused(false);
  else setPaused(true);
}

function onKD(e){
  keys[e.code]=true;getAC();
  if(e.code==='KeyP'||e.code==='Escape'){ togglePause(); return; }
  if(e.code==='Space'){e.preventDefault();
    if(state==='launch')launchBall();
    else if(state==='playing'&&AP.magnet>0)releaseCaught();
    else if(state==='paused')resumeFromPause();
    else if(state==='menu')startGame();
    else if(state==='gameOver'||state==='victory')startGame();}
  if(e.code==='KeyR'){camTheta=0.30;camPhi=0.42;camR=1300;orbitPauseTimer=0;}
  if(e.code==='KeyV'){toggleCamMode();}
}
function onKU(e){keys[e.code]=false;}

function onTS(e){
  if(uiIsBlocking() || isUIEvent(e)) return;
  e.preventDefault();getAC();
  if(e.touches.length===2){
    const dx=e.touches[1].clientX-e.touches[0].clientX;
    const dy=e.touches[1].clientY-e.touches[0].clientY;
    const dist=Math.hypot(dx,dy);
    const ang=Math.atan2(dy,dx);
    touch2Prev={
      cx:(e.touches[0].clientX+e.touches[1].clientX)/2,
      cy:(e.touches[0].clientY+e.touches[1].clientY)/2,
      dist, ang
    };
    pinchStartDist=dist;
    pinchStartR=camR;
    touch1Start=null;
    return;
  }
  const t=e.touches[0];
  touch1Start={x:t.clientX,y:t.clientY};touch1Moved=false;
  if(camMode!=='orbit'){
    mouseX=(t.clientX/window.innerWidth)*GW;
    mouseX=Math.max(0,Math.min(GW,mouseX));
  } else {
    const g=c2g(t.clientX,t.clientY);
    mouseX=Math.max(0,Math.min(GW,g.x));
  }
}
function onTM(e){
  if(uiIsBlocking() || isUIEvent(e)) return;
  e.preventDefault();getAC();
  if(e.touches.length===2){
    const x0=e.touches[0].clientX, y0=e.touches[0].clientY;
    const x1=e.touches[1].clientX, y1=e.touches[1].clientY;
    const cx=(x0+x1)/2;
    const cy=(y0+y1)/2;
    const dx=x1-x0, dy=y1-y0;
    const dist=Math.hypot(dx,dy);
    const ang=Math.atan2(dy,dx);

    if(touch2Prev){
      const dcx=cx-touch2Prev.cx;
      const dcy=cy-touch2Prev.cy;
      if(camMode!=='orbit'){
        cockpitLookOffX+=dcx*1.4;
        cockpitLookOffY+=dcy*0.9;
        cockpitLookOffX=Math.max(-320,Math.min(320,cockpitLookOffX));
        cockpitLookOffY=Math.max(-180,Math.min(180,cockpitLookOffY));
      } else {
        // Two-finger drag rotates, pinch zooms, twist rotates (mobile-friendly orbit)
        camTheta-=dcx*.007;
        camPhi  -=dcy*.004;

        let dA=ang-touch2Prev.ang;
        if(dA>Math.PI) dA-=Math.PI*2;
        else if(dA<-Math.PI) dA+=Math.PI*2;
        if(Math.abs(dA)>0.002) camTheta-=dA*0.9;

        if(touch2Prev.dist>0 && dist>0){
          camR=Math.max(500,Math.min(2200,camR*(touch2Prev.dist/dist)));
        }
        orbitPauseTimer=300;
      }
    } else {
      pinchStartDist=dist; pinchStartR=camR;
    }

    touch2Prev={cx,cy,dist,ang};
    return;
  }
  touch2Prev=null;
  const t=e.touches[0];
  // FIX #4: use larger threshold in cockpit (paddle always moves), only 22px horizontal counts as "moved"
  if(touch1Start){
    const dx=Math.abs(t.clientX-touch1Start.x);
    const dy=Math.abs(t.clientY-touch1Start.y);
    // A real drag: must move 22px and mostly horizontal — otherwise treat as a stationary tap
    if(dx>22||dy>22)touch1Moved=true;
  }
  if(camMode!=='orbit'){
    mouseX=(t.clientX/window.innerWidth)*GW;
    mouseX=Math.max(0,Math.min(GW,mouseX));
  } else {
    const g=c2g(t.clientX,t.clientY);
    mouseX=Math.max(0,Math.min(GW,g.x));
  }
}
function onTE(e){
  lastTouchEndTime=Date.now(); // mark touch end to suppress synthetic click
  if(uiIsBlocking() || isUIEvent(e)){
    touch1Start=null; touch1Moved=false; touch2Prev=null;
    return;
  }
  if(e.touches.length===0)touch2Prev=null;
  if(e.changedTouches.length>0&&!touch1Moved&&touch1Start){
    const t=e.changedTouches[0];
    const g=c2g(t.clientX,t.clientY);handleClick(g.x,g.y);
  }
  touch1Start=null;
  touch1Moved=false;
}

// ═════════════════════════════════════════════════════════════════════════════
// GAME LOOP
// ═════════════════════════════════════════════════════════════════════════════
let lastT=0;
let _loopErrors=0;
function loop(ts){
  _frames++; _lastFrameMs=performance.now();
  try{
  const raw=ts-lastT;lastT=ts;
  let dt=Math.min(raw/16.667,2.8);
  if(state==='paused') dt=0;
  _lastDT=dt;
  if(state!=='paused') timeE+=raw*.001;

  if(state==='playing'){update(dt);}
  else if(state==='paused'){
    // Fully freeze gameplay while paused (no particles, no shake, no paddle drift)
  }
  else if(state==='launch'){
    fc++;updShake(dt);updP();updST();
    const tgt=mouseX-paddle.w/2;
    const launchSnap=(camMode!=='orbit')?0.58:0.28;
    paddle.x+=(tgt-paddle.x)*launchSnap;
    paddle.x=Math.max(0,Math.min(GW-paddle.w,paddle.x));
    if(keys['ArrowLeft']||keys['KeyA'])mouseX-=(camMode!=='orbit'?15:9)*dt;
    if(keys['ArrowRight']||keys['KeyD'])mouseX+=(camMode!=='orbit'?15:9)*dt;
    mouseX=Math.max(paddle.w/2,Math.min(GW-paddle.w/2,mouseX));
  } else {fc++;updShake(dt);updP();updST();}

  if(renderer){
    try{ sync3D(); }catch(e){}
    try{ if(state!=='paused' && window.MediaSkins) MediaSkins.tick(ts); }catch(e){}
    try{ renderer.render(scene,camera); }catch(e){}
  }
  renderHUD();
  try{ _syncPauseBtn(); }catch(e){}
  _loopErrors=0;
  }catch(e){
    _loopErrors++;
    if(_loopErrors===1)console.error('Loop error:',e);
    if(_loopErrors>5){showFatalError('Runtime error:<br>'+e.message);return;}
  }
  if(_loopDriver==='raf') RAF(loop);
}

// ═════════════════════════════════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════════════════════════════════
function showFatalError(msg){
  $id('c3d').style.display='none';
  const e=document.createElement('div');
  e.style.cssText='position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000208;color:#00f7ff;font-family:Orbitron,sans-serif;text-align:center;padding:24px;z-index:99999;';
  e.innerHTML='<div style="font-size:32px;margin-bottom:16px">⚡</div>'
    +'<div style="font-size:14px;color:#ff4d6d;margin-bottom:12px">SYSTEM FAILURE</div>'
    +'<div style="font-size:11px;opacity:.7;line-height:1.8">'+msg+'</div>'
    +'<div style="margin-top:20px;font-size:10px;opacity:.5">Try reloading • Requires WebGL &amp; Internet</div>';
  document.body.appendChild(e);
}

function init(){
  // Guard: THREE.js must be loaded
  if(typeof THREE==='undefined'){
    showFatalError('THREE.js failed to load.<br>Check your internet connection and reload.');
    return;
  }
  // Guard: WebGL must be available
  try{
    const testCanvas=document.createElement('canvas');
    const gl=testCanvas.getContext('webgl')||testCanvas.getContext('experimental-webgl');
    if(!gl){showFatalError('WebGL is not supported or disabled on this device.');return;}
  }catch(e){showFatalError('WebGL check failed: '+e.message);return;}

  try{
    setupHud();
    initThree();
    // Global crash hooks: show an on-screen error instead of a silent black screen
    window.addEventListener('error', (ev)=>{
      try{ showFatalError('Uncaught error:<br>'+ (ev.message||'Unknown') ); }catch(e){}
    });
    window.addEventListener('unhandledrejection', (ev)=>{
      const r=ev.reason;
      const msg = (r && (r.message||r.toString())) || 'Unknown rejection';
      try{ showFatalError('Unhandled rejection:<br>'+ msg ); }catch(e){}
    });
    // WebGL context loss handler
    try{
      const cv=renderer && renderer.domElement;
      if(cv){
        cv.addEventListener('webglcontextlost', (e)=>{ e.preventDefault(); try{ showFatalError('WebGL context lost.<br>Close other apps/tabs and reload.'); }catch(_){} }, false);
      }
    }catch(e){}

    calcHud();
  }catch(e){
    showFatalError('Initialization error:<br>'+e.message+'<br><br>'+e.stack);
    return;
  }

  try{hi=parseInt(localStorage.getItem('cybrk_hi'))||0;}catch(e){}
  window.addEventListener('resize',()=>{
    renderer.setSize(window.innerWidth,window.innerHeight);
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();resizeHud();calcHud();},false);
  window.addEventListener('mousedown',onMD,false);
  window.addEventListener('mousemove',onMM,false);
  window.addEventListener('mouseup',onMU,false);
  window.addEventListener('click',onCK,false);
  window.addEventListener('wheel',onWheel,{passive:true});
  window.addEventListener('contextmenu',e=>e.preventDefault(),false);
  document.addEventListener('keydown',onKD,false);
  document.addEventListener('keyup',onKU,false);
  const c=$id('c3d');
  c.addEventListener('touchstart',onTS,{passive:false});
  c.addEventListener('touchmove',onTM,{passive:false});
  c.addEventListener('touchend',onTE,{passive:false});
  lastT=performance.now();
  // Hide loading screen — everything is ready
  const ls=$id('loadingScreen');
  if(ls)ls.style.display='none';
  try{ _updatePauseBtn(); }catch(e){}
  // Render one frame immediately (prevents black if RAF is delayed)
  try{ sync3D(); if(renderer) renderer.render(scene,camera); }catch(e){}
  try{ renderHUD(); }catch(e){}
  // Start main loop (RAF with automatic timer fallback)
  _startLoop();
}


// ─────────────────────────────────────────────────────────────────────────────
// SAFE MODE BOOT (prevents infinite LOADING)
// - Starts even if remote resources never finish loading (no window.onload dependency)
// - Waits briefly for THREE, then offers 2D SAFE MODE if 3D engine can't load
// ─────────────────────────────────────────────────────────────────────────────
function init2DOnly(reason){
  try{
    setupHud();
    calcHud();
  }catch(e){
    showFatalError('2D HUD init failed:<br>'+e.message);
    return;
  }

  // Disable 3D pipeline
  renderer=null; scene=null; camera=null;

  // Same input/listeners as 3D init
  window.addEventListener('resize',()=>{ resizeHud(); calcHud(); },false);
  window.addEventListener('mousedown',onMD,false);
  window.addEventListener('mousemove',onMM,false);
  window.addEventListener('mouseup',onMU,false);
  window.addEventListener('click',onCK,false);
  window.addEventListener('wheel',onWheel,{passive:true});
  window.addEventListener('contextmenu',e=>e.preventDefault(),false);
  document.addEventListener('keydown',onKD,false);
  document.addEventListener('keyup',onKU,false);
  const c=$id('c3d');
  c.addEventListener('touchstart',onTS,{passive:false});
  c.addEventListener('touchmove',onTM,{passive:false});
  c.addEventListener('touchend',onTE,{passive:false});

  // Hide loading
  const ls=$id('loadingScreen');
  if(ls) ls.style.display='none';
  try{ _updatePauseBtn(); }catch(e){}

  // Small banner so you know you're in safe mode
  try{
    const b=document.createElement('div');
    b.style.cssText='position:fixed;left:10px;top:10px;z-index:99997;background:rgba(0,0,0,.45);border:1px solid rgba(0,247,255,.25);border-radius:10px;padding:8px 10px;color:#00f7ff;font-family:Orbitron,sans-serif;font-size:10px;letter-spacing:1px;';
    b.innerHTML='SAFE MODE (2D)<div style="opacity:.65;font-size:9px;margin-top:3px">'+(reason||'3D engine unavailable')+'</div>';
    document.body.appendChild(b);
  }catch(e){}

  lastT=performance.now();
  try{ renderHUD(); }catch(e){}
  _startLoop();
}

function boot(){
  
  try{ document.documentElement.classList.add('classic-mode'); }catch(e){}
if(window.__cybrk_booted) return;
  window.__cybrk_booted=true;

  const ls=$id('loadingScreen');
  const start=performance.now();

  // Add a tiny status line under LOADING
  let statusLine=null;
  try{
    statusLine=document.createElement('div');
    statusLine.style.cssText='margin-top:10px;font-family:Orbitron,sans-serif;font-size:9px;color:rgba(0,247,255,0.45);letter-spacing:1.6px;';
    statusLine.textContent='BOOTING 3D ENGINE…';
    if(ls) ls.appendChild(statusLine);
  }catch(e){}

  let decided=false;

  function offerChoice(msg){
    if(decided) return;
    decided=true;
    if(!ls){
      // If we can't access the loading screen, fall back to fatal overlay.
      showFatalError(msg);
      return;
    }
    ls.style.pointerEvents='auto';
    ls.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:22px;font-family:Orbitron,sans-serif;color:#00f7ff">'
      +'<div style="font-size:30px;margin-bottom:14px">⚡</div>'
      +'<div style="font-size:13px;color:#ff4d6d;margin-bottom:10px;letter-spacing:2px">ENGINE STALLED</div>'
      +'<div style="font-size:10px;opacity:.75;line-height:1.6;max-width:320px">'+msg+'</div>'
      +'<div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;justify-content:center">'
      +'<button id="btnSafe" style="all:unset;cursor:pointer;padding:10px 14px;border-radius:12px;border:1px solid rgba(0,247,255,.35);background:rgba(0,247,255,.08);font-size:10px;letter-spacing:1.5px">START 2D SAFE MODE</button>'
      +'<button id="btnRetry" style="all:unset;cursor:pointer;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,77,109,.35);background:rgba(255,77,109,.08);font-size:10px;letter-spacing:1.5px">RETRY 3D</button>'
      +'</div>'
      +'<div style="margin-top:14px;font-size:9px;opacity:.55;line-height:1.5;max-width:340px">'
      +'If you are offline: download <b>three.min.js</b> (r128 / 0.128.0) and put it next to this HTML file.'
      +'</div>'
      +'</div>';
    const safeBtn=$id('btnSafe');
    const retryBtn=$id('btnRetry');
    if(safeBtn) safeBtn.onclick=()=>init2DOnly(msg);
    if(retryBtn) retryBtn.onclick=()=>{
      try{ location.reload(); }catch(e){}
    };
  }

  // Hard timeout: NEVER sit on LOADING forever
  const hardTimeout=setTimeout(()=>{
    offerChoice('THREE.js did not finish loading. This usually happens when the page is opened from <b>content://</b> with blocked/hanging network requests.');
  }, 6000);

  // Wait for the async loader promise (if present)
  const p = window.__cybrk_three_ready;
  if(p && typeof p.then==='function'){
    p.then((ok)=>{
      if(decided) return;
      clearTimeout(hardTimeout);
      if(statusLine) statusLine.textContent = ok ? '3D ENGINE READY' : '3D ENGINE FAILED';
      if(!ok || typeof THREE==='undefined'){
        offerChoice('THREE.js failed to load.');
        return;
      }
      // WebGL must be available
      try{
        const testCanvas=document.createElement('canvas');
        const gl=testCanvas.getContext('webgl')||testCanvas.getContext('experimental-webgl');
        if(!gl){
          offerChoice('WebGL is not supported or disabled on this device.');
          return;
        }
      }catch(e){
        offerChoice('WebGL check failed: '+e.message);
        return;
      }
      // Start full 3D game
      try{ init(); }catch(e){ offerChoice('Initialization error: '+e.message); }
    });
  }else{
    // No promise available → offer safe mode
    offerChoice('Bootloader error: THREE loader not found.');
  }
}

// Boot as soon as DOM is ready (DO NOT wait for window.onload)
document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
